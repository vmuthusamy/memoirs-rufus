<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">

    * { margin: 0; padding: 0; box-sizing: border-box; }

    canvas { display: block; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; }

<body>

<!-- Load level data -->
<script src="levels/level1.js"></script>
<script src="levels/level2.js"></script>
<script src="levels/level3.js"></script>
<script src="levels/secret.js"></script>
<script src="levels/level4.js"></script>
<script src="levels/level5.js"></script>
<script src="levels/level6.js"></script>

<!-- Load Kaplay game engine -->
<script src="https://unpkg.com/kaplay@3001/dist/kaplay.js"></script>

<script>
// ============================================
// 🦊 ADVENTURES OF RUFUS
// A game by a young fox lover, built with code!
// ============================================

// --- START THE GAME ENGINE ---
kaplay({
  width: 800,
  height: 600,
  background: [20, 20, 40],
  stretch: true,
  letterbox: true,
  crisp: true,
  touchToMouse: true,
});

// --- TOUCH SETUP ---
// Kaplay's touchToMouse: true handles menu clicks.
// We just need to prevent iOS zoom/scroll gestures on the canvas.
(function setupTouch() {
  function setup() {
    const c = document.querySelector("canvas");
    if (!c) { setTimeout(setup, 100); return; }
    c.style.touchAction = "none";
  }
  setup();
})();

// --- HOW FAST AND HIGH RUFUS MOVES ---
const foxSpeed = 300;
const jumpForce = 650;
const tailSpinDuration = 0.4;

// All levels in order
const ALL_LEVELS = [LEVEL_1, LEVEL_2, LEVEL_3, LEVEL_4, LEVEL_5, LEVEL_6];

// --- DRAW RUFUS AS PIXEL ART ---
// This creates a little fox sprite that looks like the real Rufus!
function drawFoxSprite() {
  const c = document.createElement("canvas");
  c.width = 32;
  c.height = 32;
  const ctx = c.getContext("2d");

  // Body (orange)
  ctx.fillStyle = "#D2691E";
  ctx.fillRect(8, 12, 16, 12);

  // Head (orange, rounder)
  ctx.fillStyle = "#D2691E";
  ctx.fillRect(10, 4, 14, 12);

  // Ears (pointy orange)
  ctx.fillStyle = "#D2691E";
  ctx.fillRect(10, 0, 4, 6);
  ctx.fillRect(20, 0, 4, 6);

  // Inner ears (darker)
  ctx.fillStyle = "#A0522D";
  ctx.fillRect(11, 1, 2, 4);
  ctx.fillRect(21, 1, 2, 4);

  // Belly (lighter)
  ctx.fillStyle = "#F4A460";
  ctx.fillRect(12, 16, 10, 6);

  // Eyes (black, bright)
  ctx.fillStyle = "#000";
  ctx.fillRect(13, 7, 3, 3);
  ctx.fillRect(19, 7, 3, 3);

  // Eye shine
  ctx.fillStyle = "#FFF";
  ctx.fillRect(14, 7, 1, 1);
  ctx.fillRect(20, 7, 1, 1);

  // Nose (black)
  ctx.fillStyle = "#000";
  ctx.fillRect(16, 10, 2, 2);

  // BIG TOOTHY GRIN - Rufus's signature!
  ctx.fillStyle = "#FFF";
  ctx.fillRect(12, 13, 2, 2);
  ctx.fillRect(14, 12, 2, 2);
  ctx.fillRect(16, 13, 2, 2);
  ctx.fillRect(18, 12, 2, 2);
  ctx.fillRect(20, 13, 2, 2);

  // Legs
  ctx.fillStyle = "#8B4513";
  ctx.fillRect(10, 24, 4, 6);
  ctx.fillRect(20, 24, 4, 6);

  // Paws (darker)
  ctx.fillStyle = "#5C3317";
  ctx.fillRect(10, 28, 4, 4);
  ctx.fillRect(20, 28, 4, 4);

  // Tail (the famous spinning tail!)
  ctx.fillStyle = "#D2691E";
  ctx.fillRect(2, 14, 6, 4);
  ctx.fillRect(0, 12, 4, 4);

  // White tail tip
  ctx.fillStyle = "#FFFFFF";
  ctx.fillRect(0, 12, 3, 4);

  return c;
}

// --- DRAW RUFUS SPINNING (tail out wide) ---
function drawFoxSpinning() {
  const c = document.createElement("canvas");
  c.width = 40;
  c.height = 32;
  const ctx = c.getContext("2d");

  // Same body but shifted right to make room for extended tail
  const ox = 6;

  // Body
  ctx.fillStyle = "#D2691E";
  ctx.fillRect(ox + 8, 12, 16, 12);

  // Head
  ctx.fillStyle = "#D2691E";
  ctx.fillRect(ox + 10, 4, 14, 12);

  // Ears
  ctx.fillStyle = "#D2691E";
  ctx.fillRect(ox + 10, 0, 4, 6);
  ctx.fillRect(ox + 20, 0, 4, 6);

  ctx.fillStyle = "#A0522D";
  ctx.fillRect(ox + 11, 1, 2, 4);
  ctx.fillRect(ox + 21, 1, 2, 4);

  // Belly
  ctx.fillStyle = "#F4A460";
  ctx.fillRect(ox + 12, 16, 10, 6);

  // Eyes (dizzy spiral look when spinning!)
  ctx.fillStyle = "#000";
  ctx.fillRect(ox + 13, 7, 3, 3);
  ctx.fillRect(ox + 19, 7, 3, 3);
  ctx.fillStyle = "#FFD700";
  ctx.fillRect(ox + 14, 8, 1, 1);
  ctx.fillRect(ox + 20, 8, 1, 1);

  // Nose
  ctx.fillStyle = "#000";
  ctx.fillRect(ox + 16, 10, 2, 2);

  // Grin
  ctx.fillStyle = "#FFF";
  ctx.fillRect(ox + 12, 13, 2, 2);
  ctx.fillRect(ox + 14, 12, 2, 2);
  ctx.fillRect(ox + 16, 13, 2, 2);
  ctx.fillRect(ox + 18, 12, 2, 2);
  ctx.fillRect(ox + 20, 13, 2, 2);

  // Legs
  ctx.fillStyle = "#8B4513";
  ctx.fillRect(ox + 10, 24, 4, 6);
  ctx.fillRect(ox + 20, 24, 4, 6);
  ctx.fillStyle = "#5C3317";
  ctx.fillRect(ox + 10, 28, 4, 4);
  ctx.fillRect(ox + 20, 28, 4, 4);

  // EXTENDED TAIL (spinning!)
  ctx.fillStyle = "#D2691E";
  ctx.fillRect(0, 10, 14, 6);
  // Tail blur lines
  ctx.fillStyle = "#F4A460";
  ctx.fillRect(0, 10, 14, 1);
  ctx.fillRect(0, 15, 14, 1);
  // White tip
  ctx.fillStyle = "#FFF";
  ctx.fillRect(0, 10, 4, 6);

  // Spin effect lines on the right side too
  ctx.fillStyle = "#D2691E";
  ctx.fillRect(ox + 24, 12, 10, 4);
  ctx.fillStyle = "#F4A460";
  ctx.fillRect(ox + 24, 12, 10, 1);
  ctx.fillRect(ox + 24, 15, 10, 1);
  ctx.fillStyle = "#FFF";
  ctx.fillRect(ox + 32, 12, 4, 4);

  return c;
}

// --- DRAW A TREAT (berry) ---
function drawTreat() {
  const c = document.createElement("canvas");
  c.width = 16;
  c.height = 16;
  const ctx = c.getContext("2d");
  // Berry body
  ctx.fillStyle = "#FF4444";
  ctx.fillRect(4, 4, 8, 8);
  ctx.fillRect(2, 6, 12, 4);
  ctx.fillRect(6, 2, 4, 12);
  // Shine
  ctx.fillStyle = "#FF8888";
  ctx.fillRect(5, 5, 2, 2);
  // Leaf
  ctx.fillStyle = "#228B22";
  ctx.fillRect(7, 0, 3, 4);
  ctx.fillRect(10, 1, 2, 2);
  return c;
}

// --- DRAW A CRATE (smashable) ---
function drawCrate() {
  const c = document.createElement("canvas");
  c.width = 32;
  c.height = 32;
  const ctx = c.getContext("2d");
  // Main crate
  ctx.fillStyle = "#8B6914";
  ctx.fillRect(0, 0, 32, 32);
  // Planks
  ctx.fillStyle = "#A0792C";
  ctx.fillRect(2, 2, 28, 12);
  ctx.fillRect(2, 18, 28, 12);
  // Cross boards
  ctx.fillStyle = "#6B4E0A";
  ctx.fillRect(14, 0, 4, 32);
  ctx.fillRect(0, 14, 32, 4);
  // Nails
  ctx.fillStyle = "#888";
  ctx.fillRect(3, 3, 2, 2);
  ctx.fillRect(27, 3, 2, 2);
  ctx.fillRect(3, 27, 2, 2);
  ctx.fillRect(27, 27, 2, 2);
  return c;
}

// --- DRAW A BOUNCE CRATE (springy! helps Rufus reach high places) ---
function drawBounceCrate() {
  const c = document.createElement("canvas");
  c.width = 32;
  c.height = 32;
  const ctx = c.getContext("2d");
  // Main crate (green tinted - looks special!)
  ctx.fillStyle = "#2E7D32";
  ctx.fillRect(0, 0, 32, 32);
  // Planks
  ctx.fillStyle = "#43A047";
  ctx.fillRect(2, 2, 28, 12);
  ctx.fillRect(2, 18, 28, 12);
  // Cross boards
  ctx.fillStyle = "#1B5E20";
  ctx.fillRect(14, 0, 4, 32);
  ctx.fillRect(0, 14, 32, 4);
  // Spring arrow pointing up (so player knows to jump on it!)
  ctx.fillStyle = "#FFD700";
  ctx.fillRect(13, 6, 6, 8);
  ctx.fillRect(10, 8, 12, 4);
  ctx.fillRect(13, 4, 6, 4);
  // Arrow tip
  ctx.fillRect(15, 2, 2, 4);
  return c;
}

// --- DRAW A WALKER ENEMY (squirrel) ---
function drawWalker() {
  const c = document.createElement("canvas");
  c.width = 24;
  c.height = 24;
  const ctx = c.getContext("2d");
  // Body (gray squirrel)
  ctx.fillStyle = "#808080";
  ctx.fillRect(6, 8, 12, 10);
  // Head
  ctx.fillStyle = "#808080";
  ctx.fillRect(8, 2, 10, 8);
  // Ears
  ctx.fillStyle = "#696969";
  ctx.fillRect(8, 0, 3, 4);
  ctx.fillRect(15, 0, 3, 4);
  // Eyes (angry!)
  ctx.fillStyle = "#FF0000";
  ctx.fillRect(10, 4, 2, 2);
  ctx.fillRect(15, 4, 2, 2);
  // Big fluffy tail
  ctx.fillStyle = "#A0A0A0";
  ctx.fillRect(0, 4, 6, 10);
  ctx.fillRect(2, 2, 4, 4);
  // Feet
  ctx.fillStyle = "#555";
  ctx.fillRect(8, 18, 4, 4);
  ctx.fillRect(14, 18, 4, 4);
  return c;
}

// --- DRAW AN ARMORED ENEMY (helmeted squirrel) ---
function drawArmored() {
  const c = document.createElement("canvas");
  c.width = 24;
  c.height = 28;
  const ctx = c.getContext("2d");
  // Helmet!
  ctx.fillStyle = "#C0C0C0";
  ctx.fillRect(6, 0, 14, 8);
  ctx.fillStyle = "#A0A0A0";
  ctx.fillRect(8, 0, 10, 2);
  // Helmet spike
  ctx.fillStyle = "#FFD700";
  ctx.fillRect(12, -2, 3, 4);
  // Body
  ctx.fillStyle = "#808080";
  ctx.fillRect(6, 12, 12, 10);
  // Head (behind helmet visor)
  ctx.fillStyle = "#808080";
  ctx.fillRect(8, 6, 10, 8);
  // Eyes (angry, visible through visor)
  ctx.fillStyle = "#FF0000";
  ctx.fillRect(10, 8, 2, 2);
  ctx.fillRect(15, 8, 2, 2);
  // Visor slit
  ctx.fillStyle = "#333";
  ctx.fillRect(8, 7, 10, 1);
  // Tail
  ctx.fillStyle = "#A0A0A0";
  ctx.fillRect(0, 8, 6, 10);
  ctx.fillRect(2, 6, 4, 4);
  // Feet
  ctx.fillStyle = "#555";
  ctx.fillRect(8, 22, 4, 4);
  ctx.fillRect(14, 22, 4, 4);
  return c;
}

// --- DRAW DISARMED ENEMY (helmet popped off) ---
function drawDisarmed() {
  const c = document.createElement("canvas");
  c.width = 24;
  c.height = 24;
  const ctx = c.getContext("2d");
  // Same as walker but dazed
  ctx.fillStyle = "#808080";
  ctx.fillRect(6, 8, 12, 10);
  ctx.fillStyle = "#808080";
  ctx.fillRect(8, 2, 10, 8);
  ctx.fillStyle = "#696969";
  ctx.fillRect(8, 0, 3, 4);
  ctx.fillRect(15, 0, 3, 4);
  // Dizzy eyes (spirals!)
  ctx.fillStyle = "#FFD700";
  ctx.fillRect(10, 4, 2, 2);
  ctx.fillRect(15, 4, 2, 2);
  ctx.fillStyle = "#FFA500";
  ctx.fillRect(11, 5, 1, 1);
  ctx.fillRect(16, 5, 1, 1);
  // Stars around head (dazed!)
  ctx.fillStyle = "#FFD700";
  ctx.fillRect(6, 0, 2, 2);
  ctx.fillRect(18, 0, 2, 2);
  ctx.fillRect(12, -2, 2, 2);
  // Tail
  ctx.fillStyle = "#A0A0A0";
  ctx.fillRect(0, 4, 6, 10);
  ctx.fillRect(2, 2, 4, 4);
  // Feet
  ctx.fillStyle = "#555";
  ctx.fillRect(8, 18, 4, 4);
  ctx.fillRect(14, 18, 4, 4);
  return c;
}

// --- DRAW EXIT FLAG ---
function drawFlag() {
  const c = document.createElement("canvas");
  c.width = 32;
  c.height = 48;
  const ctx = c.getContext("2d");
  // Pole
  ctx.fillStyle = "#8B4513";
  ctx.fillRect(4, 0, 4, 48);
  // Flag
  ctx.fillStyle = "#FF6600";
  ctx.fillRect(8, 2, 20, 16);
  // Fox paw print on flag
  ctx.fillStyle = "#FFF";
  ctx.fillRect(14, 6, 4, 4);
  ctx.fillRect(12, 4, 2, 2);
  ctx.fillRect(18, 4, 2, 2);
  ctx.fillRect(15, 11, 2, 2);
  return c;
}

// --- DRAW MARTHINA (fluffy Italian fox, cuddly, no teeth) ---
function drawMarthina() {
  const c = document.createElement("canvas");
  c.width = 36;
  c.height = 34;
  const ctx = c.getContext("2d");

  // Fluffy body (rounder, bigger, lighter orange)
  ctx.fillStyle = "#E8A040";
  ctx.fillRect(6, 12, 22, 14);
  ctx.fillRect(4, 14, 26, 10); // Extra width = fluffiness

  // Big white chest/belly (she's very fluffy here)
  ctx.fillStyle = "#FFF8F0";
  ctx.fillRect(10, 14, 14, 10);
  ctx.fillRect(8, 16, 18, 6);

  // Fluffy head (rounder, wider than Rufus)
  ctx.fillStyle = "#E8A040";
  ctx.fillRect(8, 2, 18, 14);
  ctx.fillRect(6, 4, 22, 10); // Extra fluff on sides

  // White face patch (big white muzzle area)
  ctx.fillStyle = "#FFF8F0";
  ctx.fillRect(12, 8, 10, 8);
  ctx.fillRect(10, 10, 14, 4);

  // Fluffy ears (rounder, not as pointy as Rufus)
  ctx.fillStyle = "#E8A040";
  ctx.fillRect(9, 0, 5, 5);
  ctx.fillRect(22, 0, 5, 5);
  ctx.fillStyle = "#D4883A";
  ctx.fillRect(10, 1, 3, 3);
  ctx.fillRect(23, 1, 3, 3);

  // Sweet eyes (rounder, friendlier than Rufus)
  ctx.fillStyle = "#2D5A1E";
  ctx.fillRect(13, 6, 3, 3);
  ctx.fillRect(20, 6, 3, 3);
  // Big eye shine (sparkly!)
  ctx.fillStyle = "#FFF";
  ctx.fillRect(14, 6, 2, 1);
  ctx.fillRect(21, 6, 2, 1);

  // Small pink nose
  ctx.fillStyle = "#FF9999";
  ctx.fillRect(16, 10, 2, 2);

  // Gentle smile (NO teeth - she's sweet not toothy!)
  ctx.fillStyle = "#D4883A";
  ctx.fillRect(14, 12, 2, 1);
  ctx.fillRect(16, 13, 2, 1);
  ctx.fillRect(18, 12, 2, 1);

  // Fluffy cheeks
  ctx.fillStyle = "#FFCCAA";
  ctx.fillRect(10, 9, 2, 2);
  ctx.fillRect(24, 9, 2, 2);

  // Stubby fluffy legs
  ctx.fillStyle = "#D4883A";
  ctx.fillRect(10, 26, 5, 6);
  ctx.fillRect(21, 26, 5, 6);
  // White paws
  ctx.fillStyle = "#FFF8F0";
  ctx.fillRect(10, 30, 5, 2);
  ctx.fillRect(21, 30, 5, 2);

  // Big fluffy tail
  ctx.fillStyle = "#E8A040";
  ctx.fillRect(0, 12, 6, 6);
  ctx.fillRect(-2, 10, 6, 6);
  // White tail tip (bigger than Rufus's)
  ctx.fillStyle = "#FFF8F0";
  ctx.fillRect(-2, 10, 4, 6);

  return c;
}

// --- DRAW RENARD (grumpy French fox, darker, scowling) ---
function drawRenard() {
  const c = document.createElement("canvas");
  c.width = 32;
  c.height = 32;
  const ctx = c.getContext("2d");

  // Body (darker brownish-orange)
  ctx.fillStyle = "#B85C2A";
  ctx.fillRect(8, 12, 16, 12);

  // Head (darker)
  ctx.fillStyle = "#B85C2A";
  ctx.fillRect(10, 4, 14, 12);

  // Dark ear tips (very French fox look)
  ctx.fillStyle = "#B85C2A";
  ctx.fillRect(10, 0, 4, 6);
  ctx.fillRect(20, 0, 4, 6);
  ctx.fillStyle = "#333";
  ctx.fillRect(10, 0, 4, 2);
  ctx.fillRect(20, 0, 4, 2);

  // Inner ears
  ctx.fillStyle = "#8B4513";
  ctx.fillRect(11, 1, 2, 4);
  ctx.fillRect(21, 1, 2, 4);

  // Belly (cream)
  ctx.fillStyle = "#DEB887";
  ctx.fillRect(12, 16, 10, 6);

  // Grumpy eyes (angry eyebrows!)
  ctx.fillStyle = "#000";
  ctx.fillRect(13, 7, 3, 3);
  ctx.fillRect(19, 7, 3, 3);
  // Angry eyebrows slanting down
  ctx.fillStyle = "#333";
  ctx.fillRect(12, 5, 4, 2);
  ctx.fillRect(19, 5, 4, 2);
  ctx.fillRect(13, 6, 2, 1);
  ctx.fillRect(21, 6, 2, 1);

  // Eye glint (even grumps have a spark)
  ctx.fillStyle = "#FFF";
  ctx.fillRect(14, 7, 1, 1);
  ctx.fillRect(20, 7, 1, 1);

  // Nose
  ctx.fillStyle = "#000";
  ctx.fillRect(16, 10, 2, 2);

  // Frown (definitely NOT smiling)
  ctx.fillStyle = "#8B4513";
  ctx.fillRect(13, 13, 2, 1);
  ctx.fillRect(15, 14, 4, 1);
  ctx.fillRect(19, 13, 2, 1);

  // Legs (darker)
  ctx.fillStyle = "#6B3410";
  ctx.fillRect(10, 24, 4, 6);
  ctx.fillRect(20, 24, 4, 6);
  ctx.fillStyle = "#333";
  ctx.fillRect(10, 28, 4, 4);
  ctx.fillRect(20, 28, 4, 4);

  // Tail
  ctx.fillStyle = "#B85C2A";
  ctx.fillRect(2, 14, 6, 4);
  ctx.fillRect(0, 12, 4, 4);
  ctx.fillStyle = "#FFF";
  ctx.fillRect(0, 12, 3, 4);

  return c;
}

// --- DRAW FIERY (baby T-Rex, red/orange, big head, tiny arms) ---
function drawFirey() {
  const c = document.createElement("canvas");
  c.width = 32;
  c.height = 34;
  const ctx = c.getContext("2d");

  // Body (red-orange)
  ctx.fillStyle = "#CC3300";
  ctx.fillRect(8, 12, 16, 14);

  // Belly (lighter, like his ribbed tummy in the photo)
  ctx.fillStyle = "#FFAA66";
  ctx.fillRect(11, 14, 10, 10);
  // Belly ridges
  ctx.fillStyle = "#FF9955";
  ctx.fillRect(11, 16, 10, 1);
  ctx.fillRect(11, 19, 10, 1);
  ctx.fillRect(11, 22, 10, 1);

  // Big head (T-Rex has a big head!)
  ctx.fillStyle = "#CC3300";
  ctx.fillRect(6, 0, 20, 14);

  // Big jaw
  ctx.fillStyle = "#AA2200";
  ctx.fillRect(6, 8, 20, 6);

  // Teeth!! (T-Rex teeth!)
  ctx.fillStyle = "#FFF";
  ctx.fillRect(8, 8, 2, 3);
  ctx.fillRect(12, 8, 2, 3);
  ctx.fillRect(16, 8, 2, 3);
  ctx.fillRect(20, 8, 2, 3);
  ctx.fillRect(24, 8, 2, 3);
  // Bottom teeth
  ctx.fillRect(10, 11, 2, 2);
  ctx.fillRect(14, 11, 2, 2);
  ctx.fillRect(18, 11, 2, 2);
  ctx.fillRect(22, 11, 2, 2);

  // Eyes (round, curious baby eyes)
  ctx.fillStyle = "#FFD700";
  ctx.fillRect(10, 3, 4, 4);
  ctx.fillRect(20, 3, 4, 4);
  ctx.fillStyle = "#000";
  ctx.fillRect(11, 4, 2, 2);
  ctx.fillRect(21, 4, 2, 2);
  ctx.fillStyle = "#FFF";
  ctx.fillRect(12, 4, 1, 1);
  ctx.fillRect(22, 4, 1, 1);

  // Tiny T-Rex arms!
  ctx.fillStyle = "#CC3300";
  ctx.fillRect(4, 16, 4, 3);
  ctx.fillRect(24, 16, 4, 3);
  ctx.fillStyle = "#AA2200";
  ctx.fillRect(3, 18, 2, 2);
  ctx.fillRect(26, 18, 2, 2);

  // Thick legs
  ctx.fillStyle = "#AA2200";
  ctx.fillRect(9, 26, 6, 8);
  ctx.fillRect(19, 26, 6, 8);
  ctx.fillStyle = "#882200";
  ctx.fillRect(9, 30, 6, 4);
  ctx.fillRect(19, 30, 6, 4);

  // Spiky back/head ridges
  ctx.fillStyle = "#FF4400";
  ctx.fillRect(14, -2, 4, 3);
  ctx.fillRect(10, 0, 3, 2);
  ctx.fillRect(19, 0, 3, 2);

  // Big thick T-Rex tail!
  ctx.fillStyle = "#CC3300";
  ctx.fillRect(0, 18, 8, 5);
  ctx.fillRect(-2, 20, 6, 4);
  ctx.fillRect(-4, 22, 4, 3);
  // Tail ridges
  ctx.fillStyle = "#FF4400";
  ctx.fillRect(0, 18, 8, 1);
  ctx.fillRect(-2, 20, 6, 1);
  // Tail tip
  ctx.fillStyle = "#AA2200";
  ctx.fillRect(-4, 23, 3, 2);

  return c;
}

// --- DRAW BOOKWORM (small brown worm, wiggly) ---
// --- DRAW A CLOWN SQUIRREL (theme park enemy!) ---
function drawClown() {
  const c = document.createElement("canvas");
  c.width = 28;
  c.height = 28;
  const ctx = c.getContext("2d");

  // Big red afro hair

// ============================================
// LEADERBOARD - saves high scores for each level
// ============================================

// How many scores to keep per level
const MAX_SCORES = 10;

// Load all high scores from localStorage
function getLeaderboard() {
  try {
    return JSON.parse(localStorage.getItem("rufus_leaderboard")) || {};
  } catch (e) {
    return {};
  }
}

// Save the leaderboard back to localStorage
function saveLeaderboard(board) {
  localStorage.setItem("rufus_leaderboard", JSON.stringify(board));
}

// Add a score for a level. Returns true if it made the top 10!
function addScore(levelIndex, name, score) {
  const board = getLeaderboard();
  const key = "level_" + levelIndex;
  if (!board[key]) board[key] = [];
  board[key].push({ name: name, score: score, date: Date.now() });
  // Sort highest first
  board[key].sort((a, b) => b.score - a.score);
  // Keep only top scores
  board[key] = board[key].slice(0, MAX_SCORES);
  saveLeaderboard(board);
}

// Check if a score would make the top 10 for a level
function isHighScore(levelIndex, score) {
  if (score <= 0) return false;
  const board = getLeaderboard();
  const key = "level_" + levelIndex;
  const scores = board[key] || [];
  if (scores.length < MAX_SCORES) return true;
  return score > scores[scores.length - 1].score;
}

// Get scores for a specific level
function getScores(levelIndex) {
  const board = getLeaderboard();
  return board["level_" + levelIndex] || [];
}

// ============================================
// COLLECTIBLES - gems (no-death) and golden paws (hidden)
// ============================================

// Load collectibles from localStorage
function getCollectibles() {
  try {
    return JSON.parse(localStorage.getItem("rufus_collectibles")) || { gems: {}, paws: {} };
  } catch (e) {
    return { gems: {}, paws: {} };
  }
}

// Save collectibles back to localStorage
function saveCollectibles(data) {
  localStorage.setItem("rufus_collectibles", JSON.stringify(data));
}

// Award a gem for completing a level without dying
function awardGem(levelIndex) {
  const data = getCollectibles();
  data.gems[levelIndex] = true;
  saveCollectibles(data);
}

// Award a golden paw (hidden collectible found!)
function awardPaw(levelIndex) {
  const data = getCollectibles();
  data.paws[levelIndex] = true;
  saveCollectibles(data);
}

// Check if player already has the gem for a level
function hasGem(levelIndex) {
  return getCollectibles().gems[levelIndex] === true;
}

// Check if player already has the golden paw for a level
function hasPaw(levelIndex) {
  return getCollectibles().paws[levelIndex] === true;
}

// Check if ALL golden paws have been collected (unlocks secret level!)
function allPawsCollected() {
  const data = getCollectibles();
  for (let i = 0; i < ALL_LEVELS.length; i++) {
    if (!data.paws[i]) return false;
  }
  return true;
}

// Check if jetpack is unlocked
function hasJetpack() {
  return localStorage.getItem("rufus_jetpack") === "true";
}

// Unlock the jetpack!
function unlockJetpack() {
  localStorage.setItem("rufus_jetpack", "true");
}

// NAME ENTRY SCENE - arcade-style initials!
// ============================================
scene("nameEntry", ({ score, levelIndex, nextScene, earnedGem, pawCollectedThisRun }) => {
  const isTouch = ("ontouchstart" in window) || navigator.maxTouchPoints > 0;

  // Background
  add([rect(width(), height()), pos(0, 0), color(20, 15, 40), fixed()]);

  // Title
  add([
    text("NEW HIGH SCORE!", { size: 40 }),
    pos(width() / 2, 60),
    anchor("center"),
    color(255, 215, 0),
    fixed(),
  ]);

  // Show the score
  add([
    text(`${score} treats!`, { size: 28 }),
    pos(width() / 2, 110),
    anchor("center"),
    color(255, 200, 100),
    fixed(),
  ]);

  // The letters the player can pick from
  const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let name = ["A", "A", "A"];
  let cursor = 0; // Which letter we're editing (0, 1, or 2)

  // Draw the 3-letter name display
  const nameLetters = [];
  for (let i = 0; i < 3; i++) {
    nameLetters.push(add([
      text(name[i], { size: 56 }),
      pos(width() / 2 - 60 + i * 60, 200),
      anchor("center"),
      color(255, 255, 255),
      fixed(),
    ]));
  }

  // Cursor underline
  const cursorLine = add([
    rect(40, 4),
    pos(width() / 2 - 60, 235),
    anchor("center"),
    color(255, 215, 0),
    fixed(),
  ]);

  // Update display
  function updateDisplay() {
    for (let i = 0; i < 3; i++) {
      nameLetters[i].text = name[i];
      nameLetters[i].color = rgb(i === cursor ? 255 : 150, i === cursor ? 255 : 150, i === cursor ? 0 : 150);
    }
    cursorLine.pos.x = width() / 2 - 60 + cursor * 60;
  }

  // Keyboard: type letters directly
  onCharInput((ch) => {
    const upper = ch.toUpperCase();
    if (alphabet.includes(upper)) {
      name[cursor] = upper;
      if (cursor < 2) cursor++;
      updateDisplay();
    }
  });

  // Arrow keys to cycle letters and move cursor
  onKeyPress("up", () => {
    const idx = alphabet.indexOf(name[cursor]);
    name[cursor] = alphabet[(idx + 1) % alphabet.length];
    updateDisplay();
  });
  onKeyPress("down", () => {
    const idx = alphabet.indexOf(name[cursor]);
    name[cursor] = alphabet[(idx - 1 + alphabet.length) % alphabet.length];
    updateDisplay();
  });
  onKeyPress("left", () => {
    cursor = Math.max(0, cursor - 1);
    updateDisplay();
  });
  onKeyPress("right", () => {
    cursor = Math.min(2, cursor + 1);
    updateDisplay();
  });
  onKeyPress("backspace", () => {
    name[cursor] = "A";
    if (cursor > 0) cursor--;
    updateDisplay();
  });

  // Submit with Enter
  function submitScore() {
    addScore(levelIndex, name.join(""), score);
    go(nextScene, { score, levelIndex, earnedGem, pawCollectedThisRun });
  }
  onKeyPress("enter", submitScore);

  // Touch controls: letter grid for mobile
  if (isTouch) {
    // Up/Down arrows for current letter
    const upBtn = add([
      rect(60, 40), pos(width() / 2 - 60 + cursor * 60, 160),
      anchor("center"), color(80, 70, 100), outline(2, rgb(150, 130, 200)),
      fixed(), area(),
    ]);
    add([
      text("^", { size: 24 }), pos(width() / 2 - 60 + cursor * 60, 160),
      anchor("center"), color(255, 255, 255), fixed(),
    ]);

    // Letter grid for easy tap entry
    const gridStartY = 290;
    const cols = 9;
    const cellW = 50;
    const cellH = 45;
    for (let i = 0; i < alphabet.length; i++) {
      const col = i % cols;
      const row = Math.floor(i / cols);
      const x = width() / 2 - (cols * cellW) / 2 + col * cellW + cellW / 2;
      const y = gridStartY + row * cellH;

      const letterBtn = add([
        rect(cellW - 6, cellH - 6),
        pos(x, y),
        anchor("center"),
        color(60, 50, 80),
        outline(1, rgb(120, 100, 160)),
        fixed(),
        area(),
      ]);
      add([
        text(alphabet[i], { size: 20 }),
        pos(x, y),
        anchor("center"),
        color(220, 220, 255),
        fixed(),
      ]);
      letterBtn.onClick(() => {
        name[cursor] = alphabet[i];
        if (cursor < 2) cursor++;
        updateDisplay();
      });
    }

    // Back button
    const backBtn = add([
      rect(80, 40), pos(width() / 2 - 80, gridStartY + 4 * cellH + 10),
      anchor("center"), color(120, 60, 60), outline(2, rgb(200, 100, 100)),
      fixed(), area(),
    ]);
    add([
      text("Back", { size: 18 }), pos(width() / 2 - 80, gridStartY + 4 * cellH + 10),
      anchor("center"), color(255, 200, 200), fixed(),
    ]);
    backBtn.onClick(() => {
      name[cursor] = "A";
      if (cursor > 0) cursor--;
      updateDisplay();
    });

    // OK button
    const okBtn = add([
      rect(80, 40), pos(width() / 2 + 80, gridStartY + 4 * cellH + 10),
      anchor("center"), color(60, 120, 60), outline(2, rgb(100, 200, 100)),
      fixed(), area(),
    ]);
    add([
      text("OK!", { size: 18 }), pos(width() / 2 + 80, gridStartY + 4 * cellH + 10),
      anchor("center"), color(200, 255, 200), fixed(),
    ]);
    okBtn.onClick(submitScore);
  }

  // Instructions
  add([
    text(isTouch ? "Tap letters, then OK!" : "Type your name, then press ENTER!", { size: 16 }),
    pos(width() / 2, 265),
    anchor("center"),
    color(180, 170, 200),
    fixed(),
  ]);

  updateDisplay();
});

// LEADERBOARD SCENE - shows top scores

scene("leaderboard", () => {
  const isTouch = ("ontouchstart" in window) || navigator.maxTouchPoints > 0;
  let currentLevel = 0;

  // Background
  add([rect(width(), height()), pos(0, 0), color(25, 15, 35), fixed()]);

  // Title
  add([
    text("High Scores", { size: 44 }),
    pos(width() / 2, 50),
    anchor("center"),
    color(255, 215, 0),
    fixed(),
  ]);

  // Trophy icon made of text
  add([
    text("*", { size: 60 }),
    pos(width() / 2, 10),
    anchor("center"),
    color(255, 215, 0),
    fixed(),
  ]);

  // Level tab buttons
  const tabs = [];
  const tabLabels = [];
  ALL_LEVELS.forEach((level, i) => {
    const tabX = width() / 2 - (ALL_LEVELS.length - 1) * 100 + i * 200;
    const tab = add([
      rect(180, 35),
      pos(tabX, 100),
      anchor("center"),
      color(i === 0 ? 100 : 50, i === 0 ? 80 : 40, i === 0 ? 60 : 30),
      outline(2, rgb(150, 120, 80)),
      fixed(),
      area(),
    ]);
    const label = add([
      text(`Ch.${i + 1}: ${level.name}`, { size: 13 }),
      pos(tabX, 100),
      anchor("center"),
      color(255, 200, 100),
      fixed(),
    ]);
    tab.onClick(() => {
      currentLevel = i;
      showScores();
    });
    tabs.push(tab);
    tabLabels.push(label);
  });

  // Score entries container - we'll rebuild these when switching tabs
  let scoreEntries = [];

  function showScores() {
    // Update tab colors
    tabs.forEach((tab, i) => {
      tab.color = rgb(i === currentLevel ? 100 : 50, i === currentLevel ? 80 : 40, i === currentLevel ? 60 : 30);
    });

    // Clear old entries
    scoreEntries.forEach((e) => { if (e.exists()) destroy(e); });
    scoreEntries = [];

    const scores = getScores(currentLevel);
    const startY = 150;

    // Table header
    scoreEntries.push(add([
      text("Rank   Name    Score", { size: 18 }),
      pos(width() / 2, startY),
      anchor("center"),
      color(180, 160, 130),
      fixed(),
    ]));

    // Divider line
    scoreEntries.push(add([
      rect(400, 2),
      pos(width() / 2, startY + 20),
      anchor("center"),
      color(100, 80, 60),
      fixed(),
    ]));

    if (scores.length === 0) {
      scoreEntries.push(add([
        text("No scores yet! Go play!", { size: 20 }),
        pos(width() / 2, startY + 80),
        anchor("center"),
        color(150, 130, 160),
        fixed(),
      ]));
    } else {
      scores.forEach((entry, i) => {
        const y = startY + 45 + i * 35;
        // Medal colors for top 3
        const medalColors = [
          [255, 215, 0],   // Gold
          [192, 192, 192], // Silver
          [205, 127, 50],  // Bronze
        ];
        const textColor = i < 3 ? medalColors[i] : [200, 190, 170];
        const rank = i < 3 ? ["1st", "2nd", "3rd"][i] : `${i + 1}th`;

        scoreEntries.push(add([
          text(`${rank}    ${entry.name}     ${entry.score}`, { size: 20 }),
          pos(width() / 2, y),
          anchor("center"),
          color(...textColor),
          fixed(),
        ]));
      });
    }
  }

  // Show first level by default
  showScores();

  // Back button
  const backBtn = add([
    rect(160, 45),
    pos(width() / 2, 550),
    anchor("center"),

    pos(width() / 2, 550),
    anchor("center"),
    color(255, 200, 100),
    fixed(),
  ]);
  backBtn.onClick(() => go("title"));

  // Keyboard shortcuts
  onKeyPress("escape", () => go("title"));
  ALL_LEVELS.forEach((_, i) => {
    onKeyPress(`${i + 1}`, () => {
      currentLevel = i;
      showScores();
    });
  });
});

scene("levelSelect", () => {
  add([
    rect(width(), height()),
    pos(0, 0),

    fixed(),
  ]);

  add([
    text("Rufus's Journal", { size: 40 }),
    pos(width() / 2, 40),
    anchor("center"),
    color(255, 200, 100),
    fixed(),
  ]);

  // Scrollable journal — entries use camera, title stays fixed
  const entrySpacing = 90;
  const entryHeight = 75;
  // Calculate total content height
  let scrollY = height() / 2;
  const hasSecretEntry = allPawsCollected();
  const totalEntries = ALL_LEVELS.length + (hasSecretEntry ? 1 : 0) + 1; // +1 for bottom row
  const contentHeight = 120 + totalEntries * entrySpacing;
  const minScrollY = height() / 2;
  const maxScrollY = Math.max(minScrollY, contentHeight - height() / 2);

  ALL_LEVELS.forEach((level, i) => {
    const y = 120 + i * entrySpacing;

    const entry = add([
      rect(600, entryHeight),
      pos(width() / 2, y),
      anchor("center"),
      color(60, 50, 35),
      outline(2, rgb(100, 80, 50)),
      area(),
    ]);
    entry.onClick(() => go("memoir", i));

    add([
      text(`Chapter ${i + 1}: ${level.name}`, { size: 20 }),
      pos(width() / 2, y - 12),
      anchor("center"),
      color(255, 200, 100),
    ]);

    const preview = level.memoir.substring(0, 55) + "...";
    add([

      anchor("center"),
      color(200, 180, 140),

    const isTouch = ("ontouchstart" in window) || navigator.maxTouchPoints > 0;
    add([

    rect(290, 60),
    pos(width() / 2 + 155, bottomY),
    anchor("center"),
    color(45, 35, 50),
    outline(2, rgb(120, 100, 60)),
    area(),
  ]);
  scoresEntry.onClick(() => go("leaderboard"));
  add([ text("High Scores", { size: 16 }), pos(width() / 2 + 155, bottomY - 10), anchor("center"), color(255, 215, 0) ]);
  add([ text(isTouch ? "Tap to view" : "Press H", { size: 11 }), pos(width() / 2 + 155, bottomY + 12), anchor("center"), color(200, 180, 140) ]);

  // Scroll hint (only if content overflows)
  if (maxScrollY > minScrollY) {
    add([
      text(isTouch ? "Swipe to scroll" : "Up/Down to scroll", { size: 12 }),
      pos(width() / 2, height() - 15),
      anchor("center"),
      color(150, 130, 100),
      opacity(0.6),
      fixed(),
    ]);
  }

  // Scroll with keyboard
  onKeyDown("down", () => {
    scrollY = Math.min(maxScrollY, scrollY + 300 * dt());
  });
  onKeyDown("up", () => {
    scrollY = Math.max(minScrollY, scrollY - 300 * dt());
  });

  // Scroll with touch drag
  let touchStartY = null;
  let touchScrollStart = 0;
  onTouchStart((tpos) => {
    touchStartY = tpos.y;
    touchScrollStart = scrollY;
  });
  onTouchMove((tpos) => {
    if (touchStartY !== null) {
      const delta = touchStartY - tpos.y;
      scrollY = Math.max(minScrollY, Math.min(maxScrollY, touchScrollStart + delta));
    }
  });
  onTouchEnd(() => { touchStartY = null; });

  // Update camera to scroll position
  onUpdate(() => {
    camPos(width() / 2, scrollY);
  });

  // Keyboard controls
  ALL_LEVELS.forEach((_, i) => {
    onKeyPress(`${i + 1}`, () => {
      go("memoir", i);
    });
  });

  onKeyPress("a", () => go("about"));
  onKeyPress("h", () => go("leaderboard"));
  onKeyPress("escape", () => go("title"));
});

// ============================================
// MAIN GAME
// ============================================
scene("game", (levelIndex, startLives, spawnPos, deathCount) => {
  const isSecret = (levelIndex === "secret");
  const level = isSecret ? SECRET_LEVEL : ALL_LEVELS[levelIndex];
  let score = 0;
  let isSpinning = false;
  const defaultLives = isSecret ? 3 : (level.startLives || 3);
  let lives = (startLives !== undefined) ? startLives : defaultLives;
  let spinCooldown = 0;
  let nextExtraLife = 200;
  let deathsThisRun = deathCount || 0;
  let pawCollectedThisRun = false;

  // Power cycling (secret level only)
  const POWERS = ["spin", "fire", "float"];
  let currentPowerIndex = 0;
  let currentPower = "spin";
  let isFloating = false;
  let floatTimer = 0;
  const floatDuration = 1.5;
  let powerHUD = null;
  let powerIcon = null;
  let spinBtnLabel = null;
  let spinBtnRef = null;
  // Use checkpoint spawn position if provided, otherwise level start
  const playerSpawn = spawnPos || level.playerStart;

  // Set gravity
  setGravity(1600);

  // Level theme flags
  const isGym = level.name === "The School Gym";
  const isNeighborhood = level.name === "The Neighborhood";
  const isThemePark = level.name === "The Theme Park";

  // Background sky
  add([
    rect(level.width, height()),
    pos(0, 0),
    color(...level.skyColor),
    fixed(),
    z(-10),
  ]);

  // Draw some background clouds (or themed backgrounds)
  if (isThemePark) {
    // === CARNIVAL TENT INTERIOR ===

    // Red and white vertical stripes across the whole tent canopy
    const stripeWidth = 80;
    for (let sx = 0; sx < level.width; sx += stripeWidth) {
      const isWhite = (sx / stripeWidth) % 2 === 0;
      add([
        rect(stripeWidth, height()),
        pos(sx, 0),
        color(isWhite ? 220 : 160, isWhite ? 200 : 30, isWhite ? 200 : 30),
        opacity(isWhite ? 0.08 : 0.12),
        z(-9),
      ]);
    }

    // Tent peak lines — diagonal folds radiating from tent poles
    for (let pole = 0; pole < level.width; pole += 800) {
      // Tent pole
      add([ rect(6, height()), pos(pole + 397, 0), color(140, 100, 40), opacity(0.15), z(-8) ]);
      // Gold ball on top of pole
      add([ rect(12, 12), pos(pole + 391, 10), color(220, 180, 50), opacity(0.2), z(-8) ]);
      // Draping fabric lines from each pole (V shapes)
      for (let d = -3; d <= 3; d++) {
        const dx = d * 60;
        add([ rect(2, 200), pos(pole + 400 + dx, 20), color(120, 20, 20), opacity(0.08), z(-9) ]);
      }
    }

    // String lights — twinkling bulbs hanging across the tent
    for (let lx = 0; lx < level.width; lx += 35) {
      const droop = Math.sin(lx * 0.015) * 20;
      const ly = 55 + droop;
      // Wire
      if (lx % 70 === 0) {
        add([ rect(70, 1), pos(lx, ly), color(60, 40, 30), opacity(0.3), z(-7) ]);
      }
      // Colorful bulb
      const bulbColors = [[255,60,60],[255,220,50],[60,220,60],[60,150,255],[255,100,220]];
      const bc = bulbColors[Math.floor(lx / 35) % bulbColors.length];
      const bulb = add([
        rect(5, 5),
        pos(lx, ly + 2),
        color(...bc),
        opacity(0.5),
        z(-7),
        { t: rand(0, 6.28) },
      ]);
      bulb.onUpdate(() => {
        bulb.t += dt() * 2;
        bulb.opacity = Math.sin(bulb.t) * 0.2 + 0.45;
      });
    }

    // Bunting flags — little triangular pennants
    for (let bx = 0; bx < level.width; bx += 50) {
      const buntingColors = [[200,40,40],[255,255,255],[40,40,200],[255,200,50]];
      const fc = buntingColors[Math.floor(bx / 50) % buntingColors.length];
      // Triangle approximation (small rects stacked)
      add([ rect(12, 4), pos(bx, 85), color(...fc), opacity(0.25), z(-8) ]);
      add([ rect(8, 4), pos(bx + 2, 89), color(...fc), opacity(0.25), z(-8) ]);
      add([ rect(4, 4), pos(bx + 4, 93), color(...fc), opacity(0.25), z(-8) ]);
    }
  } else if (level.isMagical) {
    // Magical floating sparkles across the whole sky
    for (let i = 0; i < 30; i++) {
      const sparkle = add([
        rect(rand(2, 5), rand(2, 5)),
        pos(rand(0, level.width), rand(20, 500)),
        color(255, 215, rand(100, 255)),
        opacity(rand(0.2, 0.6)),
        z(-4),
        { t: rand(0, 6.28), sparkleSpeed: rand(1, 3), driftSpeed: rand(5, 15) },
      ]);
      sparkle.onUpdate(() => {
        sparkle.t += dt() * sparkle.sparkleSpeed;
        sparkle.opacity = Math.sin(sparkle.t) * 0.25 + 0.35;
        sparkle.pos.y += Math.sin(sparkle.t * 0.5) * sparkle.driftSpeed * dt();
      });
    }
    // Purple/gold gradient bands in the sky
    for (let sy = 0; sy < 5; sy++) {
      const bandY = sy * 120;
      const r = 140 + sy * 20;
      const g = 100 - sy * 10;
      const b = 180 - sy * 20;
      add([
        rect(level.width, 120),
        pos(0, bandY),
        color(r, g, b),
        opacity(0.15),
        z(-8),
      ]);
    }
    // Stars twinkling in the twilight
    for (let i = 0; i < 20; i++) {
      const star = add([
        rect(2, 2),
        pos(rand(0, level.width), rand(0, 250)),
        color(255, 255, rand(200, 255)),
        opacity(rand(0.3, 0.7)),
        z(-6),
        { t: rand(0, 6.28) },
      ]);
      star.onUpdate(() => {
        star.t += dt() * rand(1, 3);
        star.opacity = Math.sin(star.t) * 0.3 + 0.4;
      });
    }
  } else {
    for (let i = 0; i < 8; i++) {
      add([
        rect(rand(60, 120), rand(20, 40)),
        pos(rand(0, level.width), rand(30, 200)),
        color(255, 255, 255),
        opacity(0.3),
        z(-5),
      ]);
    }
  }

  // Background roller coaster with squirrel riders (Theme Park only!)
  if (isThemePark) {
    // The roller coaster track — a wavy line in the background
    const trackPoints = [];
    for (let tx = 0; tx < level.width; tx += 40) {
      // Wavy track with hills and dips
      const hill1 = Math.sin(tx * 0.003) * 80;
      const hill2 = Math.sin(tx * 0.007 + 1) * 40;
      const ty = 150 + hill1 + hill2;
      trackPoints.push({ x: tx, y: ty });
      // Draw track segment
      add([ rect(42, 4), pos(tx, ty), color(120, 120, 130), opacity(0.35), z(-7) ]);
      // Track supports (vertical poles going down)
      if (tx % 160 === 0) {
        add([ rect(3, 400 - ty), pos(tx + 19, ty + 4), color(100, 100, 110), opacity(0.2), z(-8) ]);
      }
      // Cross ties on track
      if (tx % 80 === 0) {
        add([ rect(6, 8), pos(tx + 17, ty - 2), color(140, 140, 150), opacity(0.25), z(-7) ]);
      }
    }

    // Squirrel riders! A new cart spawns every 5 seconds
    const cartColors = [[220,50,50],[50,50,220],[50,180,50],[220,180,50],[220,50,220],[50,200,200]];
    let cartCount = 0;

    function spawnRiderCart() {
      const ci = cartCount % cartColors.length;
      const cc = cartColors[ci];
      const startX = rand(200, 800);
      const cartSpeed = rand(70, 130);
      cartCount++;

      const cart = add([
        rect(20, 12),
        pos(startX, 150),
        color(...cc),
        opacity(0.5),
        z(-6),
        "riderCart",
        { trackX: startX, speed: cartSpeed, dir: 1 },
      ]);
      const rider = add([
        sprite("walker"),
        pos(startX, 140),
        anchor("bot"),
        scale(1),
        opacity(0.5),
        z(-6),
        "riderSquirrel",
        { cart: cart },
      ]);
    }

    // Start with 2 carts, then spawn one every 5 seconds
    spawnRiderCart();
    spawnRiderCart();
    loop(5, () => { spawnRiderCart(); });

    // All carts follow the wavy track
    onUpdate("riderCart", (cart) => {
      cart.trackX += cart.speed * cart.dir * dt();
      if (cart.trackX > level.width - 200) cart.dir = -1;
      if (cart.trackX < 200) cart.dir = 1;
      const hill1 = Math.sin(cart.trackX * 0.003) * 80;
      const hill2 = Math.sin(cart.trackX * 0.007 + 1) * 40;
      const trackY = 150 + hill1 + hill2;
      cart.pos.x = cart.trackX;
      cart.pos.y = trackY;
    });

    // Squirrels follow their carts
    onUpdate("riderSquirrel", (rider) => {
      if (!rider.cart || !rider.cart.exists()) { destroy(rider); return; }
      rider.pos.x = rider.cart.pos.x + 4;
      rider.pos.y = rider.cart.pos.y - 2;
      rider.flipX = rider.cart.dir < 0;
    });
  }

  // Ground
  const ground = add([
    rect(level.width, 40),
    pos(0, height() - 40),
    color(...level.groundColor),
    outline(2, isGym ? rgb(130, 95, 45) : isThemePark ? rgb(120, 115, 100) : isSecret ? rgb(180, 150, 50) : rgb(0, 100, 0)),
    area(),
    body({ isStatic: true }),
    "ground",
  ]);

  if (isGym) {
    // Gym floor lines — like court markings on a wooden gym floor
    for (let gx = 0; gx < level.width; gx += 200) {
      // Court line markings (white dashes)
      add([ rect(2, 30), pos(gx, height() - 38), color(220, 210, 180), opacity(0.3), z(-1) ]);
    }
    // Long center court line
    add([ rect(level.width, 2), pos(0, height() - 22), color(200, 50, 50), opacity(0.4), z(-1) ]);
    // Wood plank grain on the floor
    for (let gx = 0; gx < level.width; gx += rand(30, 60)) {
      add([ rect(rand(20, 40), 2), pos(gx, height() - 40 + rand(5, 30)), color(140, 105, 45), opacity(0.3), z(-1) ]);
    }
  } else if (isThemePark) {
    // Theme park path — paved with lane markings and confetti
    for (let gx = 0; gx < level.width; gx += 150) {
      // Path lane dashes (yellow center line like a road)
      add([ rect(40, 3), pos(gx, height() - 22), color(255, 220, 50), opacity(0.5), z(-1) ]);
    }
    // Confetti on the ground (colorful scraps)
    const confettiColors = [[255,80,80],[80,180,255],[255,220,50],[80,255,120],[255,120,220]];
    for (let gx = 0; gx < level.width; gx += rand(40, 80)) {
      const cc = confettiColors[Math.floor(rand(0, confettiColors.length))];
      add([ rect(rand(3, 7), rand(2, 4)), pos(gx, height() - 40 + rand(5, 30)), color(...cc), opacity(0.4), z(-1) ]);
    }
  } else if (isSecret) {
    // Magical golden sparkle tufts!
    for (let gx = 0; gx < level.width; gx += rand(25, 55)) {
      add([
        rect(3, rand(6, 12)),
        pos(gx, height() - 40 - rand(4, 10)),
        color(255, 215, rand(50, 150)),
        opacity(rand(0.4, 0.8)),
        z(-1),
      ]);
    }
    // Floating sparkle particles above ground
    for (let gx = 0; gx < level.width; gx += rand(80, 160)) {
      const groundSparkle = add([
        rect(2, 2),
        pos(gx, height() - 50 - rand(0, 20)),
        color(255, 230, rand(150, 255)),
        opacity(0.4),
        z(-1),
        { t: rand(0, 6.28) },
      ]);
      groundSparkle.onUpdate(() => {
        groundSparkle.t += dt() * 2;
        groundSparkle.opacity = Math.sin(groundSparkle.t) * 0.2 + 0.3;
      });
    }
  } else {
    // Draw grass tufts on ground (not in gym!)
    for (let gx = 0; gx < level.width; gx += rand(20, 50)) {
      add([
        rect(4, rand(6, 14)),
        pos(gx, height() - 40 - rand(4, 10)),
        color(0, rand(140, 200), 0),
        z(-1),
      ]);
    }
  }

  // --- PLATFORMS ---
  const isLibrary = level.name === "The Library";
  level.platforms.forEach((p, idx) => {
    if (isGym) {
      // Gym equipment! Each platform looks like a different piece of gym gear
      const gymType = idx % 5; // Cycle through equipment types

      if (gymType === 0) {
        // HORIZONTAL BAR — silver metal bar with support posts
        // Support posts on each end
        add([ rect(6, 60), pos(p.x + 2, p.y), color(120, 120, 130), z(0) ]);
        add([ rect(6, 60), pos(p.x + p.width - 8, p.y), color(120, 120, 130), z(0) ]);
        // Metal bar on top (the platform you stand on)
        add([
          rect(p.width, p.height),
          pos(p.x, p.y),
          color(180, 185, 195),
          outline(2, rgb(140, 145, 155)),
          area(), body({ isStatic: true }), "platform",
        ]);
        // Chrome shine on the bar
        add([ rect(p.width - 10, 4), pos(p.x + 5, p.y + 3), color(220, 225, 235), z(1) ]);
        // Bolts at the ends
        add([ rect(4, 4), pos(p.x + 4, p.y + 8), color(100, 100, 110), z(1) ]);
        add([ rect(4, 4), pos(p.x + p.width - 8, p.y + 8), color(100, 100, 110), z(1) ]);

      } else if (gymType === 1) {
        // BALANCE BEAM — narrow, padded top, wooden legs
        // Wooden legs
        add([ rect(8, 50), pos(p.x + 10, p.y + 5), color(140, 100, 50) ]);
        add([ rect(8, 50), pos(p.x + p.width - 18, p.y + 5), color(140, 100, 50) ]);
        // Beam body (padded leather)
        add([
          rect(p.width, p.height),
          pos(p.x, p.y),
          color(160, 130, 90),
          outline(2, rgb(130, 100, 65)),
          area(), body({ isStatic: true }), "platform",
        ]);
        // Suede/leather pad on top
        add([ rect(p.width - 8, 6), pos(p.x + 4, p.y - 2), color(190, 160, 110), z(1) ]);
        // Center line
        add([ rect(p.width - 16, 2), pos(p.x + 8, p.y + 12), color(140, 110, 70), z(1) ]);

      } else if (gymType === 2) {
        // VAULTING TABLE — padded blue top, chunky metal base
        // Metal base (wider at bottom)
        add([ rect(p.width - 30, 40), pos(p.x + 15, p.y + 10), color(100, 100, 110) ]);
        // Padded top
        add([
          rect(p.width, p.height),
          pos(p.x, p.y),
          color(60, 90, 180),
          outline(2, rgb(40, 65, 140)),
          area(), body({ isStatic: true }), "platform",
        ]);
        // Padding lines
        add([ rect(p.width - 6, 2), pos(p.x + 3, p.y + 5), color(80, 110, 200), z(1) ]);
        add([ rect(p.width - 6, 2), pos(p.x + 3, p.y + 15), color(80, 110, 200), z(1) ]);
        // White center stripe
        add([ rect(4, p.height - 4), pos(p.x + p.width / 2 - 2, p.y + 2), color(200, 210, 240), z(1) ]);

      } else if (gymType === 3) {
        // CLIMBING ROPE PLATFORM — wooden plank tied with ropes from above
        // Ropes hanging from above
        add([ rect(4, 80), pos(p.x + 10, p.y - 75), color(160, 130, 70) ]);
        add([ rect(4, 80), pos(p.x + p.width - 14, p.y - 75), color(160, 130, 70) ]);
        // Rope knots at top
        add([ rect(8, 6), pos(p.x + 8, p.y - 75), color(140, 110, 50) ]);
        add([ rect(8, 6), pos(p.x + p.width - 16, p.y - 75), color(140, 110, 50) ]);
        // Wooden plank
        add([
          rect(p.width, p.height),
          pos(p.x, p.y),
          color(170, 130, 70),
          outline(2, rgb(130, 95, 45)),
          area(), body({ isStatic: true }), "platform",
        ]);
        // Wood grain lines
        add([ rect(p.width - 4, 2), pos(p.x + 2, p.y + 8), color(150, 115, 55), z(1) ]);
        add([ rect(p.width - 4, 2), pos(p.x + 2, p.y + 18), color(150, 115, 55), z(1) ]);

      } else {
        // POMMEL HORSE — curved look with handles
        // Legs
        add([ rect(6, 40), pos(p.x + 15, p.y + 10), color(120, 120, 130) ]);
        add([ rect(6, 40), pos(p.x + p.width - 21, p.y + 10), color(120, 120, 130) ]);
        // Body (padded leather)
        add([
          rect(p.width, p.height),
          pos(p.x, p.y),
          color(160, 120, 80),
          outline(2, rgb(130, 90, 55)),
          area(), body({ isStatic: true }), "platform",
        ]);
        // Leather pad top
        add([ rect(p.width - 4, 5), pos(p.x + 2, p.y - 1), color(180, 140, 95), z(1) ]);
        // Handles (pommels!)
        add([ rect(6, 12), pos(p.x + p.width / 3, p.y - 10), color(140, 140, 150), z(1) ]);
        add([ rect(6, 12), pos(p.x + 2 * p.width / 3, p.y - 10), color(140, 140, 150), z(1) ]);
        // Handle tops
        add([ rect(10, 4), pos(p.x + p.width / 3 - 2, p.y - 12), color(170, 170, 180), z(1) ]);
        add([ rect(10, 4), pos(p.x + 2 * p.width / 3 - 2, p.y - 12), color(170, 170, 180), z(1) ]);
      }
    } else if (isNeighborhood) {
      // Neighborhood objects! Fences, car roofs, rooftops, benches, mailboxes
      const hoodType = idx % 5;

      if (hoodType === 0) {
        // PICKET FENCE — white fence with pointed tops
        add([
          rect(p.width, p.height),
          pos(p.x, p.y),
          color(230, 225, 215),
          outline(2, rgb(200, 195, 185)),
          area(), body({ isStatic: true }), "platform",
        ]);
        // Picket tops (little triangles as rectangles)
        for (let fx = p.x + 4; fx < p.x + p.width - 6; fx += 14) {
          add([ rect(8, p.height + 8), pos(fx, p.y - 6), color(240, 235, 225), z(0) ]);
          add([ rect(4, 6), pos(fx + 2, p.y - 10), color(240, 235, 225), z(0) ]);
        }
        // Horizontal rail
        add([ rect(p.width, 4), pos(p.x, p.y + 8), color(210, 205, 195), z(1) ]);

      } else if (hoodType === 1) {
        // CAR ROOF — colored car top with windshield
        const carColors = [[180,40,40],[40,80,180],[60,160,60],[200,180,40],[140,40,180]];
        const cc = carColors[idx % carColors.length];
        add([
          rect(p.width, p.height),
          pos(p.x, p.y),
          color(...cc),
          outline(2, rgb(cc[0]*0.7, cc[1]*0.7, cc[2]*0.7)),
          area(), body({ isStatic: true }), "platform",
        ]);
        // Windshield (blue-ish glass at front)
        add([ rect(Math.min(30, p.width / 3), p.height - 6), pos(p.x + 4, p.y + 3), color(150, 200, 240), z(1) ]);
        // Rear window
        add([ rect(Math.min(25, p.width / 4), p.height - 6), pos(p.x + p.width - 28, p.y + 3), color(150, 200, 240), z(1) ]);
        // Roof shine
        add([ rect(p.width - 20, 3), pos(p.x + 10, p.y + 2), color(255, 255, 255), opacity(0.3), z(1) ]);

      } else if (hoodType === 2) {
        // ROOFTOP — brick/shingle roof with a little chimney
        add([
          rect(p.width, p.height),
          pos(p.x, p.y),
          color(160, 80, 60),
          outline(2, rgb(130, 60, 40)),
          area(), body({ isStatic: true }), "platform",
        ]);
        // Shingle lines
        for (let sy = p.y + 6; sy < p.y + p.height - 2; sy += 8) {
          add([ rect(p.width - 4, 1), pos(p.x + 2, sy), color(140, 65, 45), z(1) ]);
        }
        // Chimney on one side
        add([ rect(14, 20), pos(p.x + p.width - 30, p.y - 18), color(120, 70, 50) ]);
        add([ rect(18, 4), pos(p.x + p.width - 32, p.y - 20), color(100, 55, 35) ]);

      } else if (hoodType === 3) {
        // PARK BENCH — green wooden bench with armrests
        // Legs
        add([ rect(6, 30), pos(p.x + 8, p.y + 8), color(60, 60, 60) ]);
        add([ rect(6, 30), pos(p.x + p.width - 14, p.y + 8), color(60, 60, 60) ]);
        // Seat
        add([
          rect(p.width, p.height),
          pos(p.x, p.y),
          color(60, 130, 60),
          outline(2, rgb(40, 100, 40)),
          area(), body({ isStatic: true }), "platform",
        ]);
        // Slats on the bench
        for (let sx = p.x + 3; sx < p.x + p.width - 4; sx += Math.max(10, p.width / 6)) {
          add([ rect(p.width / 7, p.height - 4), pos(sx, p.y + 2), color(50, 115, 50), z(1) ]);
        }
        // Armrests
        add([ rect(8, 10), pos(p.x - 2, p.y - 8), color(70, 70, 70), z(1) ]);
        add([ rect(8, 10), pos(p.x + p.width - 6, p.y - 8), color(70, 70, 70), z(1) ]);

      } else {
        // BRICK WALL — like a garden wall with mortar lines
        add([
          rect(p.width, p.height),
          pos(p.x, p.y),
          color(170, 100, 70),
          outline(2, rgb(140, 75, 50)),
          area(), body({ isStatic: true }), "platform",
        ]);
        // Brick pattern
        for (let by = 0; by < p.height - 4; by += 10) {
          const offset = (by / 10) % 2 === 0 ? 0 : 12;
          for (let bx = offset; bx < p.width - 4; bx += 24) {
            add([ rect(20, 7), pos(p.x + bx + 2, p.y + by + 2), color(185, 110, 80), z(0) ]);
          }
        }
        // Flat top cap
        add([ rect(p.width, 4), pos(p.x, p.y - 2), color(150, 90, 60), z(1) ]);
      }
    } else if (isThemePark) {
      // Theme park rides! Roller coaster rails, bumper cars, carousel, ticket booths, ferris wheel
      const rideType = idx % 5;

      if (rideType === 0) {
        // ROLLER COASTER RAIL — metal track with cross ties
        add([
          rect(p.width, p.height),
          pos(p.x, p.y),
          color(100, 100, 110),
          outline(2, rgb(70, 70, 80)),
          area(), body({ isStatic: true }), "platform",
        ]);
        // Rail tracks (two parallel lines on top)
        add([ rect(p.width - 4, 3), pos(p.x + 2, p.y + 2), color(160, 160, 170), z(1) ]);
        add([ rect(p.width - 4, 3), pos(p.x + 2, p.y + p.height - 5), color(160, 160, 170), z(1) ]);

        for (let tx = p.x + 8; tx < p.x + p.width - 8; tx += 18) {

        add([ rect(6, 6), pos(p.x + 2, p.y + p.height / 2 - 3), color(200, 180, 50), z(2) ]);

      } else if (rideType === 1) {
        // BUMPER CAR PLATFORM — colorful rubber bumper edges
        const bumperColors = [[220,50,50],[50,50,220],[50,180,50],[220,180,50],[220,50,220]];
        const bc = bumperColors[idx % bumperColors.length];
        add([
          rect(p.width, p.height),
          pos(p.x, p.y),

        ]);
        // Chrome bumper strip around edge
        add([ rect(p.width - 6, 4), pos(p.x + 3, p.y + 2), color(200, 200, 210), z(1) ]);
        add([ rect(p.width - 6, 4), pos(p.x + 3, p.y + p.height - 6), color(200, 200, 210), z(1) ]);
        // Headlight dots
        add([ rect(4, 4), pos(p.x + 8, p.y + p.height / 2 - 2), color(255, 255, 200), z(2) ]);

      } else if (rideType === 2) {

        add([

          area(), body({ isStatic: true }), "platform",

        // Gold decorative stripes
        for (let sx = p.x + 6; sx < p.x + p.width - 6; sx += 16) {

      } else if (rideType === 3) {

        add([
          rect(p.width, p.height),
          pos(p.x, p.y),
          color(160, 120, 70),
          outline(2, rgb(120, 85, 40)),
          area(), body({ isStatic: true }), "platform",
        ]);
        // Striped canopy above (red and white)
        for (let sx = p.x; sx < p.x + p.width; sx += 20) {
          const isRed = ((sx - p.x) / 20) % 2 === 0;
          add([ rect(20, 8), pos(sx, p.y - 8), color(isRed ? 220 : 240, isRed ? 40 : 230, isRed ? 40 : 230), z(0) ]);

        add([ rect(3, 50), pos(p.x + p.width - 13, p.y - 48), color(120, 120, 130) ]);

        add([ rect(p.width - 20, 2), pos(p.x + 10, p.y - 48), color(100, 100, 110) ]);
        // Gondola seat
        add([
          rect(p.width, p.height),
          pos(p.x, p.y),

        add([ rect(p.width - 8, 8), pos(p.x + 4, p.y + p.height - 10), color(80, 140, 220), z(1) ]);

    } else if (isSecret) {
      // Magical platforms! Rainbow bridges, clouds, crystals, moonbeams, stars
      const magicType = idx % 5;

      if (magicType === 0) {
        // RAINBOW BRIDGE — multicolored stripes with shimmer
        add([
          rect(p.width, p.height),
          pos(p.x, p.y),
          color(200, 100, 150),

        rainbowColors.forEach((c, i) => {

        add([rect(p.width + 10, 8), pos(p.x - 5, p.y + p.height), color(255, 245, 200), opacity(0.2), z(-1)]);
        add([rect(3, 3), pos(p.x + p.width * 0.3, p.y + 5), color(255, 255, 230), opacity(0.6), z(2)]);

      } else {
        // STAR PLATFORM — golden with animated twinkling
        add([
          rect(p.width, p.height),
          pos(p.x, p.y),
          color(220, 180, 50),
          outline(2, rgb(180, 140, 30)),
          area(), body({ isStatic: true }), "platform",
        ]);
        add([rect(p.width - 6, 3), pos(p.x + 3, p.y + 3), color(255, 220, 80), opacity(0.6), z(1)]);
        for (let i = 0; i < 2; i++) {
          const sparkle = add([
            rect(3, 3),
            pos(p.x + rand(8, p.width - 8), p.y + rand(4, p.height - 4)),
            color(255, 255, 200), opacity(0.5), z(2),
            { t: rand(0, 6.28) },
          ]);
          sparkle.onUpdate(() => {
            sparkle.t += dt() * 3;
            sparkle.opacity = Math.sin(sparkle.t) * 0.3 + 0.5;
          });
        }
      }
    } else {
      // Default platforms — books in library, wood/earth elsewhere
      add([
        rect(p.width, p.height),
        pos(p.x, p.y),
        color(isLibrary ? 120 : 101, isLibrary ? 50 : 67, isLibrary ? 50 : 33),
        outline(2, rgb(isLibrary ? 80 : 60, isLibrary ? 30 : 40, isLibrary ? 30 : 20)),
        area(),
        body({ isStatic: true }),
        "platform",
      ]);
      if (isLibrary) {
        // Book spines on platforms (colorful stripes!)
        const bookColors = [[200,50,50],[50,50,200],[50,150,50],[200,200,50],[180,80,180]];
        for (let bx = p.x + 4; bx < p.x + p.width - 8; bx += rand(12, 20)) {
          const bc = bookColors[Math.floor(rand(0, bookColors.length))];
          add([
            rect(rand(6, 12), p.height - 4),
            pos(bx, p.y + 2),
            color(...bc),
            z(0),
          ]);
        }
      }
      // Grass/shelf top
      add([
        rect(p.width, 6),
        pos(p.x, p.y - 3),
        color(0, 160, 0),
      ]);
    }
  });

  // --- TREATS ---
  level.treats.forEach((t) => {
    add([
      sprite("treat"),
      pos(t.x, t.y),
      area(),
      anchor("center"),
      z(1),
      "treat",
      { collected: false, bobOffset: rand(0, 6.28) },
    ]);
  });

  // Bob the treats up and down
  onUpdate("treat", (t) => {
    t.pos.y += Math.sin(time() * 3 + t.bobOffset) * 0.3;
  });

  // --- GOLDEN PAW (secret collectible!) ---
  if (level.secretPaw && !hasPaw(levelIndex)) {
    add([
      sprite("goldenPaw"),
      pos(level.secretPaw.x, level.secretPaw.y),
      area(),
      anchor("center"),
      scale(1.5),
      z(2),
      "goldenPaw",
      { collected: false, bobOffset: rand(0, 6.28) },
    ]);
  }

  // Bob and sparkle the golden paw
  onUpdate("goldenPaw", (p) => {
    p.pos.y += Math.sin(time() * 2 + p.bobOffset) * 0.5;
    p.angle = Math.sin(time() * 3) * 8;
  });

  // --- CRATES ---
  level.crates.forEach((c) => {
    add([
      sprite("crate"),
      pos(c.x, c.y),
      area(),
      anchor("bot"),
      z(1),
      "crate",
      "destructible",
    ]);
  });

  // --- BOUNCE CRATES (green crates that launch Rufus up!) ---
  if (level.bounceCrates) {
    level.bounceCrates.forEach((bc) => {
      add([
        sprite("bounceCrate"),
        pos(bc.x, bc.y),
        area(),
        anchor("bot"),
        body({ isStatic: true }),
        z(1),
        "bounceCrate",
      ]);
    });
  }

  // --- ENEMIES ---
  level.enemies.forEach((e) => {
    const isWasp = e.type === "wasp_patrol" || e.type === "wasp_dive";
    const isClown = e.type === "clown";
    const spriteMap = {
      walker: "walker",
      armored: "armored",
      wasp_patrol: "wasp",
      wasp_dive: "wasp",
      bookworm: "bookworm",
      clown: "clown",
    };
    const en = add([
      sprite(spriteMap[e.type] || "walker"),
      pos(e.x, e.y),
      area(),
      anchor("bot"),
      z(1),
      e.type,
      "enemy",
      {
        startX: e.x,
        startY: e.y,
        patrol: e.patrol || 100,
        speed: e.speed || 60,
        dir: 1,
        enemyType: e.type,
        isDisarmed: false,
        isWasp: isWasp,
        isClown: isClown,
        isDiving: false,
        diveTimer: 0,
      },
    ]);
  });

  // Enemy movement
  onUpdate("enemy", (e) => {
    if (e.enemyType === "wasp_patrol") {
      // Sine wave flight pattern
      e.pos.x += e.dir * (e.speed || 50) * dt();
      e.pos.y = e.startY + Math.sin(time() * 2.5) * 40;
      if (e.pos.x > e.startX + e.patrol) e.dir = -1;
      if (e.pos.x < e.startX - e.patrol) e.dir = 1;
      e.flipX = e.dir < 0;
    } else if (e.enemyType === "wasp_dive") {
      if (!e.isDiving) {
        // Hover and bob gently
        e.pos.y = e.startY + Math.sin(time() * 2) * 10;
        // Check if Rufus is close enough to dive
        const dist = Math.abs(e.pos.x - rufus.pos.x);
        if (dist < 200 && rufus.pos.y > e.pos.y) {
          e.isDiving = true;
          e.diveTimer = 1.0;
          e.diveTargetX = rufus.pos.x;
          e.diveTargetY = rufus.pos.y;
        }
      } else {
        // Diving toward target!
        const dx = e.diveTargetX - e.pos.x;
        const dy = e.diveTargetY - e.pos.y;
        const len = Math.sqrt(dx * dx + dy * dy);
        if (len > 5) {
          e.pos.x += (dx / len) * 250 * dt();
          e.pos.y += (dy / len) * 250 * dt();
        }
        e.diveTimer -= dt();
        if (e.diveTimer <= 0) {
          // Return to hover position
          e.isDiving = false;
          e.pos.x = e.startX;
          e.pos.y = e.startY;
        }
      }
      e.flipX = rufus.pos.x < e.pos.x;
    } else {
      // Walker / armored / bookworm — ground patrol
      const spd = e.enemyType === "bookworm" ? (e.speed || 45) : (e.speed || 60);
      e.pos.x += e.dir * spd * dt();
      if (e.pos.x > e.startX + e.patrol) e.dir = -1;
      if (e.pos.x < e.startX - e.patrol) e.dir = 1;
      e.flipX = e.dir < 0;
      // Bookworms wiggle up and down
      if (e.enemyType === "bookworm") {
        e.pos.y = e.startY + Math.sin(time() * 6) * 3;
      }
    }
  });

  // --- CHECKPOINTS ---
  let lastCheckpoint = null;
  if (level.checkpoints) {
    level.checkpoints.forEach((cp) => {
      add([
        sprite("checkpoint"),
        pos(cp.x, cp.y),
        area(),
        anchor("bot"),
        z(1),
        "checkpoint",
        { activated: false },
      ]);

  add([

    pos(level.exit.x, level.exit.y),
    area(),
    anchor("bot"),
    z(1),
    "exit",

  // =====================
  // 🦊 RUFUS (the player)
  // =====================
  const rufus = add([
    sprite("rufus"),
    pos(playerSpawn.x, playerSpawn.y),
    area({ shape: new Rect(vec2(0, 0), 28, 30) }),
    body(),
    anchor("center"),
    scale(2),
    z(10),
    "player",
    {
      isSpinning: false,
      spinTimer: 0,
      facingRight: true,
    },

  // Camera follows Rufus
  rufus.onUpdate(() => {
    camPos(rufus.pos.x, height() / 2);
  });

  // --- MOVEMENT ---
  onKeyDown("left", () => {
    rufus.move(-foxSpeed, 0);
    rufus.facingRight = false;
    rufus.flipX = true;
  });

  onKeyDown("right", () => {
    rufus.move(foxSpeed, 0);
    rufus.facingRight = true;
    rufus.flipX = false;
  });

  // --- JUMPING ---
  // Jetpack state
  let jetpackFuel = 0;
  const jetpackMaxFuel = 3; // seconds of boost
  // Jetpack only works in levels AFTER chapter 6 (level index 6+)
  const jetpackUnlocked = hasJetpack() && !isSecret && typeof levelIndex === "number" && levelIndex >= 6;

  onKeyPress("up", () => {
    if (rufus.isGrounded()) {
      rufus.jump(jumpForce);
      jetpackFuel = jetpackMaxFuel; // refuel on ground
    } else if (jetpackUnlocked && jetpackFuel > 0) {
      // JETPACK BOOST! Push Rufus upward while in the air
      rufus.jump(jumpForce * 0.6);
      jetpackFuel -= 1;
      // Fire particles from jetpack!
      for (let i = 0; i < 4; i++) {
        add([
          rect(rand(3, 6), rand(3, 6)),
          pos(rufus.pos.x + rand(-8, 8), rufus.pos.y + 15),
          color(255, rand(50, 150), 0),
          opacity(0.8),
          lifespan(0.3),
          move(270, rand(80, 180)),
          z(9),
        ]);
      }

    const btnSpin = add([

        "touchBtn",

      add([

        pos(width() - 50, height() - 128),
        anchor("center"),
        color(255, 215, 0),
        fixed(),
        z(201),
      ]);
    }

    // --- MULTI-TOUCH INPUT ---
    // Raw touch events with proper letterbox coordinate conversion.
    // This supports simultaneous move + jump/spin.
    const canvas = document.querySelector("canvas");
    const gameW = 800;
    const gameH = 600;
    const gameAspect = gameW / gameH;

    // Convert a touch's clientX/clientY to game coordinates,
    // accounting for letterbox black bars
    function touchToGame(touch) {
      const r = canvas.getBoundingClientRect();
      const canvasAspect = r.width / r.height;
      let areaX, areaY, areaW, areaH;

      if (canvasAspect > gameAspect) {
        // Black bars on left/right
        areaH = r.height;
        areaW = r.height * gameAspect;
        areaX = r.left + (r.width - areaW) / 2;
        areaY = r.top;
      } else {
        // Black bars on top/bottom
        areaW = r.width;
        areaH = r.width / gameAspect;
        areaX = r.left;
        areaY = r.top + (r.height - areaH) / 2;
      }

      return {
        x: (touch.clientX - areaX) / areaW * gameW,
        y: (touch.clientY - areaY) / areaH * gameH,
      };
    }

    // Track active direction touch
    let moveTouchId = null;
    let touchDir = 0; // -1 left, 0 none, 1 right

    canvas.addEventListener("touchstart", (ev) => {
      ev.preventDefault();
      if (!rufus.exists()) return; // Guard against scene changes
      for (const touch of ev.changedTouches) {
        const g = touchToGame(touch);

        // Left button area
        if (g.x >= 10 && g.x < 100 && g.y > gameH - 100) {
          moveTouchId = touch.identifier;
          touchDir = -1;
        }
        // Right button area
        else if (g.x >= 110 && g.x < 200 && g.y > gameH - 100) {
          moveTouchId = touch.identifier;
          touchDir = 1;
        }
        // Jump button area
        else if (g.x > gameW - 195 && g.x < gameW - 105 && g.y > gameH - 100) {
          if (rufus.isGrounded()) {
            rufus.jump(jumpForce);
            jetpackFuel = jetpackMaxFuel;
          } else if (jetpackUnlocked && jetpackFuel > 0) {
            rufus.jump(jumpForce * 0.6);
            jetpackFuel -= 1;
            for (let i = 0; i < 4; i++) {
              add([
                rect(rand(3, 6), rand(3, 6)),
                pos(rufus.pos.x + rand(-8, 8), rufus.pos.y + 15),
                color(255, rand(50, 150), 0),
                opacity(0.8),
                lifespan(0.3),
                move(270, rand(80, 180)),
                z(9),
              ]);
            }
          }
        }
        // Spin/Power button area
        else if (g.x > gameW - 95 && g.y > gameH - 100) {
          if (isSecret) {
            if (currentPower === "spin") doTailSpin();
            else if (currentPower === "fire") fireBreath();
            else if (currentPower === "float") activateFloat();
          } else {
            doTailSpin();
          }
        }
        // Swap power button (secret level only, above the spin button)
        else if (isSecret && g.x > gameW - 95 && g.y > gameH - 155 && g.y < gameH - 105) {
          cyclePower();
        }
      }
    }, { passive: false });

    canvas.addEventListener("touchend", (ev) => {
      ev.preventDefault();
      for (const touch of ev.changedTouches) {
        // If the direction touch was released, stop moving
        if (touch.identifier === moveTouchId) {
          moveTouchId = null;
          touchDir = 0;
        }
      }
    }, { passive: false });

    canvas.addEventListener("touchmove", (ev) => {
      ev.preventDefault();
    }, { passive: false });

    // Apply touch movement each frame
    rufus.onUpdate(() => {
      if (touchDir === -1) {
        rufus.move(-foxSpeed, 0);
        rufus.facingRight = false;
        rufus.flipX = true;
      } else if (touchDir === 1) {
        rufus.move(foxSpeed, 0);
        rufus.facingRight = true;
        rufus.flipX = false;
      }
    });
  }

  // --- TAIL SPIN ATTACK ---
  // --- POWER FUNCTIONS (secret level) ---

  // Tail spin (shared between normal and secret)
  function doTailSpin() {
    if (!rufus.isSpinning && spinCooldown <= 0) {
      rufus.isSpinning = true;
      rufus.spinTimer = tailSpinDuration;
      rufus.use(sprite("rufus_spin"));
      rufus.use(scale(2));
      spinCooldown = 0.3;
      for (let i = 0; i < 6; i++) {
        add([
          rect(4, 4),
          pos(rufus.pos.x + rand(-30, 30), rufus.pos.y + rand(-20, 20)),
          color(255, 165, 0),
          opacity(0.8),
          lifespan(0.3),
          move(rand(0, 360), rand(50, 150)),
          z(9),
        ]);
      }
    }
  }

  // Fire breath (secret level only)
  function fireBreath() {
    if (spinCooldown > 0) return;
    spinCooldown = 0.5;
    const dir = rufus.flipX ? -1 : 1;

    // Fire particles from Rufus
    for (let i = 0; i < 6; i++) {
      add([
        rect(rand(4, 8), rand(4, 8)),
        pos(rufus.pos.x + dir * 25, rufus.pos.y - 10 + rand(-8, 8)),
        color(255, rand(50, 150), 0),
        opacity(0.9),
        lifespan(0.5),
        move(dir > 0 ? 0 : 180, rand(150, 280)),
        z(9),
      ]);
    }

    // Use onUpdate to check proximity instead of area() collisions
    // This avoids freezes from colliding with platforms/ground/etc.
    const fireball = add([
      rect(12, 8),
      pos(rufus.pos.x + dir * 30, rufus.pos.y - 5),
      color(255, 100, 0),
      opacity(0.9),
      lifespan(0.6),
      z(9),
      "fireball",
      { dir: dir, hit: false },
    ]);

    fireball.onUpdate(() => {
      if (!fireball.exists() || fireball.hit) return;
      // Move the fireball manually
      fireball.pos.x += dir * 300 * dt();

      // Check enemy hits by proximity
      const enemies = get("enemy");
      for (const enemy of enemies) {
        if (!enemy.exists()) continue;
        const dx = Math.abs(fireball.pos.x - enemy.pos.x);
        const dy = Math.abs(fireball.pos.y - enemy.pos.y);
        if (dx < 25 && dy < 25) {
          fireball.hit = true;
          // Save position before destroying
          const hitX = enemy.pos.x;
          const hitY = enemy.pos.y;
          if (enemy.isClown) {
            // Fire bounces off clowns! Confetti splash
          } else if (enemy.enemyType === "armored" && !enemy.isDisarmed) {
            enemy.isDisarmed = true;
            enemy.use(sprite("disarmed"));
          } else {
            destroyEnemy(enemy);
          }
          for (let j = 0; j < 4; j++) {
            add([
              rect(rand(3, 6), rand(3, 6)),
              pos(hitX, hitY),
              color(255, rand(100, 200), 0),
              opacity(1),
              lifespan(0.3),
              move(rand(0, 360), rand(80, 150)),
              z(5),
            ]);
          }
          destroy(fireball);
          return;
        }
      }

      // Check crate hits by proximity
      const crates = get("destructible");
      for (const crate of crates) {
        if (!crate.exists()) continue;
        const dx = Math.abs(fireball.pos.x - crate.pos.x);
        const dy = Math.abs(fireball.pos.y - crate.pos.y);
        if (dx < 25 && dy < 25) {
          fireball.hit = true;
          const hitX = crate.pos.x;
          const hitY = crate.pos.y;
          for (let i = 0; i < 6; i++) {
            add([
              rect(rand(4, 8), rand(4, 8)),
              pos(hitX, hitY),
              color(255, rand(80, 160), 0),
              opacity(1),
              lifespan(0.4),
              move(rand(0, 360), rand(100, 250)),
              z(5),
            ]);
          }
          score += 25;
          scoreText.text = `Treats: ${score}`;
          destroy(crate);
          destroy(fireball);
          return;
        }
      }
    });
  }

  // Float/glide (secret level only)
  function activateFloat() {
    if (isFloating || rufus.isGrounded()) return;
    isFloating = true;
    floatTimer = floatDuration;
  }

  // Advance to next power (secret level only)
  function cyclePower() {
    currentPowerIndex = (currentPowerIndex + 1) % POWERS.length;
    currentPower = POWERS[currentPowerIndex];
    updatePowerHUD();
  }

  // Update power HUD display
  function updatePowerHUD() {
    if (!powerIcon || !powerIcon.exists()) return;
    const names = { spin: "SPIN", fire: "FIRE", float: "FLOAT" };
    const colors = { spin: [255, 165, 0], fire: [255, 80, 0], float: [150, 200, 255] };
    powerIcon.text = `Power: ${names[currentPower]}`;
    powerIcon.color = rgb(...colors[currentPower]);
    if (powerHUD && powerHUD.exists()) {
      powerHUD.color = rgb(colors[currentPower][0] * 0.15, colors[currentPower][1] * 0.15, colors[currentPower][2] * 0.15);
    }
    // Update touch button label
    if (spinBtnLabel && spinBtnLabel.exists()) {
      const labels = { spin: "SPIN", fire: "FIRE", float: "GLIDE" };
      spinBtnLabel.text = labels[currentPower];
      spinBtnLabel.color = rgb(...colors[currentPower]);
    }
  }

  // --- SPACE KEY HANDLER ---
  // Space: use current power
  onKeyPress("space", () => {
    if (isSecret) {
      if (currentPower === "spin") doTailSpin();
      else if (currentPower === "fire") fireBreath();
      else if (currentPower === "float") activateFloat();
    } else {
      doTailSpin();
    }
  });

  // Tab: cycle to next power (secret level only)
  onKeyPress("tab", () => {
    if (isSecret) cyclePower();
  });

  // Spin timer and float timer
  rufus.onUpdate(() => {
    if (rufus.isSpinning) {
      rufus.spinTimer -= dt();
      rufus.angle += 1200 * dt();
      if (rufus.spinTimer <= 0) {
        rufus.isSpinning = false;
        rufus.use(sprite("rufus"));
        rufus.use(scale(2));
        rufus.angle = 0;
      }
    }
    if (spinCooldown > 0) {
      spinCooldown -= dt();
    }
    // Float mechanic
    if (isFloating) {
      floatTimer -= dt();
      // Slow descent by capping fall speed
      if (rufus.vel && rufus.vel.y > 40) {
        rufus.vel.y = 40;
      }
      // Sparkle trail while floating
      if (Math.random() < 0.3) {
        add([
          rect(rand(2, 4), rand(2, 4)),
          pos(rufus.pos.x + rand(-15, 15), rufus.pos.y + rand(10, 25)),
          color(200, 200, 255),
          opacity(0.7),
          lifespan(0.3),
          move(270, rand(30, 80)),
          z(9),
        ]);
      }
      if (floatTimer <= 0 || rufus.isGrounded()) {
        isFloating = false;
      }
    }
  });

  rufus.onCollide("treat", (treat) => {

      treat.collected = true;
      score += 10;
      scoreText.text = `Treats: ${score}`;

      // Extra life every 200 points! (max 5 lives, not in secret level)
      if (!isSecret && score >= nextExtraLife && lives < 5) {
        lives++;
        nextExtraLife += 200;
        livesText.text = `Lives: ${"🦊".repeat(lives)}`;
        // Big "EXTRA LIFE!" popup
        const popup = add([
          text("EXTRA LIFE!", { size: 28 }),
          pos(rufus.pos.x, rufus.pos.y - 60),
          anchor("center"),
          color(255, 215, 0),
          outline(2, rgb(0, 0, 0)),
          opacity(1),
          lifespan(1.5),
          z(100),
        ]);
        popup.onUpdate(() => { if (popup.exists()) popup.pos.y -= 30 * dt(); });
      }

      // Sparkle effect!
      for (let i = 0; i < 5; i++) {
        add([
          rect(3, 3),
          pos(treat.pos),
          color(255, 255, rand(0, 100)),
          opacity(1),
          lifespan(0.4),
          move(rand(0, 360), rand(80, 200)),
        ]);
      }
      destroy(treat);
    }
  });

  // --- COLLECT GOLDEN PAW ---
  rufus.onCollide("goldenPaw", (paw) => {
    if (!paw.collected) {
      paw.collected = true;
      pawCollectedThisRun = true;
      awardPaw(levelIndex);

      // Big gold sparkle burst!
      for (let i = 0; i < 15; i++) {
        add([
          rect(rand(3, 6), rand(3, 6)),

          opacity(1),
          lifespan(0.8),
          move(rand(0, 360), rand(80, 250)),

        ]);

      // "GOLDEN PAW!" popup
      const popup = add([
        text("GOLDEN PAW!", { size: 32 }),
        pos(paw.pos.x, paw.pos.y - 40),

        color(255, 215, 0),
        outline(2, rgb(150, 100, 0)),

  // --- CHECKPOINT ACTIVATION ---
  rufus.onCollide("checkpoint", (cp) => {

      cp.use(sprite("checkpoint_active"));

      // Green flash effect
