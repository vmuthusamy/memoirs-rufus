        add([
          rect(4, 4),
          pos(cp.pos.x + rand(-15, 15), cp.pos.y - rand(10, 30)),
          color(0, 200, 0),
          opacity(0.8),
          lifespan(0.5),
          move(rand(60, 120), rand(50, 100)),
          z(5),
        ]);
      }
    }
  });

  // --- BOUNCE CRATES launch Rufus super high! ---
  rufus.onCollide("bounceCrate", () => {
    // Super jump! Higher than normal to reach platforms
    rufus.jump(jumpForce * 1.4);

    // Spring effect - green particles burst
    for (let i = 0; i < 8; i++) {
      add([
        rect(4, 4),
        pos(rufus.pos.x + rand(-20, 20), rufus.pos.y + 10),
        color(50, 200, 50),
        opacity(0.9),
        lifespan(0.4),
        move(rand(0, 360), rand(80, 200)),
        z(9),
      ]);
    }
  });

  // --- TAIL SPIN DESTROYS CRATES ---
  rufus.onCollide("crate", (crate) => {
    if (rufus.isSpinning) {
      // Crate explosion effect!
      for (let i = 0; i < 8; i++) {
        add([
          rect(rand(4, 10), rand(4, 10)),
          pos(crate.pos),
          color(139, 105, 20),
          opacity(1),
          lifespan(0.5),
          move(rand(0, 360), rand(100, 300)),
          z(5),
        ]);
      }
      score += 25;
      scoreText.text = `Treats: ${score}`;
      destroy(crate);
    }
  });

  // --- ENEMY INTERACTIONS ---
  let isInvincible = false;

  rufus.onCollide("enemy", (enemy) => {
    // Skip ALL enemy interactions during invincibility
    if (isInvincible) return;

    // Check if we're spinning (tail attack)
    if (rufus.isSpinning) {
      if (enemy.isClown) {
        // Can't spin a clown! They honk and Rufus bounces off!
        rufus.isSpinning = false;
        rufus.use(sprite("rufus"));
        rufus.use(scale(2));
        rufus.angle = 0;
        // Honk effect — colorful confetti instead of sparks
        for (let i = 0; i < 5; i++) {
          const cc = [[255,0,0],[0,200,0],[0,100,255],[255,255,0],[255,100,200]][i];
          add([
            rect(rand(3, 6), rand(3, 6)),
            pos(enemy.pos),
            color(...cc),
            opacity(1),
            lifespan(0.4),
            move(rand(0, 360), rand(100, 200)),
            z(10),
          ]);
        }
        hurtRufus();
      } else if (enemy.enemyType === "walker" || enemy.enemyType === "bookworm" || enemy.isWasp || enemy.isDisarmed) {
        // Tail spin kills walkers and disarmed enemies!
        destroyEnemy(enemy);
      } else if (enemy.enemyType === "armored" && !enemy.isDisarmed) {
        // Can't spin an armored enemy! Rufus gets hurt!
        // Stop the spin immediately
        rufus.isSpinning = false;
        rufus.use(sprite("rufus"));
        rufus.use(scale(2));
        rufus.angle = 0;
        // Visual feedback - sparks!
        for (let i = 0; i < 2; i++) {
          add([
            rect(3, 3),
            pos(enemy.pos),
            color(255, 255, 0),
            opacity(1),
            lifespan(0.3),
            move(rand(0, 360), rand(100, 200)),
          ]);
        }
        hurtRufus();
      }
    }
    // Check if we're jumping on top of enemy (wasps can't be stomped!)
    else if (!enemy.isWasp && rufus.pos.y < enemy.pos.y - 20 && !rufus.isGrounded()) {
      if (enemy.isClown) {
        // Stomp the clown! Squash with a big confetti burst!
        for (let i = 0; i < 10; i++) {
          const cc = [[255,0,0],[0,200,0],[0,100,255],[255,255,0],[255,100,200],[255,165,0]][i % 6];
          add([
            rect(rand(4, 8), rand(4, 8)),
            pos(enemy.pos),
            color(...cc),
            opacity(1),
            lifespan(0.6),
            move(rand(0, 360), rand(100, 300)),
            z(10),
          ]);
        }
        score += 50;
        scoreText.text = `Treats: ${score}`;
        destroy(enemy);
        rufus.jump(jumpForce * 0.7); // Big bounce!
      } else if (enemy.enemyType === "armored" && !enemy.isDisarmed) {
        // Jump disarms armored enemy! Helmet pops off!
        enemy.isDisarmed = true;
        enemy.use(sprite("disarmed"));
        rufus.jump(jumpForce * 0.6); // Bounce off

        // Helmet flying off effect!
        const helmet = add([
          rect(16, 10),
          pos(enemy.pos.x, enemy.pos.y - 30),
          color(192, 192, 192),
          opacity(1),
          lifespan(1),
          move(rand(60, 120), 200),
          z(15),
        ]);
      } else {
        // Stomp kills walkers and disarmed enemies
        destroyEnemy(enemy);
        rufus.jump(jumpForce * 0.6); // Bounce off
      }
    }
    // Enemy hits Rufus (ouch!) — but disarmed enemies are harmless
    else if (!enemy.isDisarmed) {
      hurtRufus();
    }
  });

  function destroyEnemy(enemy) {
    // Poof effect
    for (let i = 0; i < 4; i++) {
      add([
        rect(rand(4, 8), rand(4, 8)),
        pos(enemy.pos),
        color(rand(100, 200), rand(100, 200), rand(100, 200)),
        opacity(1),
        lifespan(0.5),
        move(rand(0, 360), rand(80, 250)),
        z(5),
      ]);
    }
    score += 50;
    scoreText.text = `Treats: ${score}`;
    destroy(enemy);
  }

  function hurtRufus() {
    if (isInvincible) return;
    isInvincible = true;
    lives--;
    deathsThisRun++;

    if (lives <= 0) {
      // Check if this score makes the leaderboard! (not for secret level)
      if (!isSecret && isHighScore(levelIndex, score)) {
        go("nameEntry", { score, levelIndex, nextScene: "gameOver" });
      } else {
        go("gameOver", { score, levelIndex });
      }
    } else if (level.isBossFight) {
      // Boss fight: respawn in place, don't restart the scene!
      livesText.text = `Lives: ${"🦊".repeat(lives)}`;
      rufus.pos.x = playerSpawn.x;
      rufus.pos.y = playerSpawn.y || 0;
      // Brief invincibility after respawn
      wait(1.5, () => { isInvincible = false; });
      // Flash Rufus to show invincibility
      let flashCount = 0;
      const flashInterval = loop(0.15, () => {
        rufus.opacity = rufus.opacity > 0.5 ? 0.3 : 1;
        flashCount++;
        if (flashCount > 10) {
          rufus.opacity = 1;
          flashInterval.cancel();
        }
      });
    } else {
      // Restart level cleanly — spawn at checkpoint if one was activated
      go("game", levelIndex, lives, lastCheckpoint || null, deathsThisRun);
    }
  }

  // --- FALL OFF SCREEN ---
  rufus.onUpdate(() => {
    if (rufus.pos.y > height() + 100) {
      hurtRufus();
    }
  });

  // --- REACH EXIT ---
  rufus.onCollide("exit", () => {
    // Award gem if player didn't die (not for secret level)
    const earnedGem = (deathsThisRun === 0 && !isSecret);
    if (earnedGem) awardGem(levelIndex);

    // Secret level goes to its own celebration scene
    if (isSecret) {
      go("secretComplete", { score });
      return;
    }

    // Boss fight unlocks the jetpack!
    if (level.isBossFight) {
      unlockJetpack();
      go("jetpackUnlock", { score, levelIndex, earnedGem, pawCollectedThisRun });
      return;
    }

    const payload = { score, levelIndex, earnedGem, pawCollectedThisRun };
    // Check if this score makes the leaderboard!
    if (isHighScore(levelIndex, score)) {
      go("nameEntry", { ...payload, nextScene: "levelComplete" });
    } else {
      go("levelComplete", payload);
    }
  });

  // --- SWARM EVENT & FIERY NPC (Level 4 only) ---
  let swarmTriggered = false;
  let fieryNPC = null;

  if (level.swarmTriggerX) {
    rufus.onUpdate(() => {
      if (!swarmTriggered && rufus.pos.x > level.swarmTriggerX) {
        swarmTriggered = true;

        // Make Rufus invincible during the cutscene!
        isInvincible = true;

        // "There's too many!" text
        const warning = add([
          text("There's too many!", { size: 24 }),
          pos(rufus.pos.x, rufus.pos.y - 80),
          anchor("center"),
          color(255, 100, 100),
          outline(2, rgb(0, 0, 0)),
          opacity(1),
          lifespan(2),
          z(100),
        ]);

        // Spawn swarm enemies AHEAD of Rufus (so he sees them coming)
        const swarmX = level.swarmTriggerX + 100;
        for (let i = 0; i < 8; i++) {
          add([
            sprite("bookworm"),
            pos(swarmX + i * 40, 535),
            area(), anchor("bot"), z(1),
            "bookworm", "enemy", "swarmEnemy",
            { startX: swarmX + i * 40, startY: 535,
              patrol: 30, speed: 40, dir: -1,
              enemyType: "bookworm", isDisarmed: false, isWasp: false, isDiving: false, diveTimer: 0 },
          ]);
        }
        for (let i = 0; i < 4; i++) {
          add([
            sprite("wasp"),
            pos(swarmX + 50 + i * 80, 250 + rand(-50, 50)),

            "wasp_patrol", "enemy", "swarmEnemy",
            { startX: swarmX + 50 + i * 80, startY: 250 + rand(-50, 50),
              patrol: 60, speed: 40, dir: -1,
              enemyType: "wasp_patrol", isDisarmed: false, isWasp: true, isDiving: false, diveTimer: 0 },

        // After 2 seconds, FIERY ARRIVES!

            anchor("center"),
            color(255, 100, 0),
            outline(3, rgb(0, 0, 0)),
            opacity(1),
            lifespan(1.5),
            z(150),
          ]);

          // Fiery enters from the right!
          const fieryEntrance = add([
            sprite("fiery"),
            pos(crashX + 200, 400),
            anchor("center"),
            scale(4),
            z(50),
          ]);

          // Fire breath effect — destroy all swarm enemies!
          wait(0.5, () => {
            // Fire wave particles
            for (let i = 0; i < 15; i++) {
              add([
                rect(rand(8, 16), rand(8, 16)),
                pos(fieryEntrance.pos.x - i * 30, fieryEntrance.pos.y + rand(-40, 40)),
                color(255, rand(50, 150), 0),
                opacity(0.9),
                lifespan(0.8),
                move(180, rand(100, 300)),
                z(49),
              ]);
            }

            // Destroy all swarm enemies
            get("swarmEnemy").forEach((e) => {
              // Poof effect
              for (let j = 0; j < 3; j++) {
                add([
                  rect(rand(4, 8), rand(4, 8)),
                  pos(e.pos),
                  color(255, rand(100, 200), 0),
                  opacity(1),
                  lifespan(0.5),
                  move(rand(0, 360), rand(80, 200)),
                  z(5),
                ]);
              }
              destroy(e);
            });

            // Fiery says his line
            const rawrText = add([
              text("RAWR! Nobody hurts my friend!", { size: 16 }),
              pos(fieryEntrance.pos.x, fieryEntrance.pos.y - 60),
              anchor("center"),
              color(255, 200, 100),
              outline(2, rgb(0, 0, 0)),
              opacity(1),
              lifespan(2.5),
              z(151),
            ]);

            // After the entrance, Fiery becomes the NPC companion
            wait(2, () => {
              if (fieryEntrance.exists()) destroy(fieryEntrance);

              // Spawn Fiery as a following NPC
              fieryNPC = add([
                sprite("fiery"),
                pos(rufus.pos.x - 80, rufus.pos.y),
                anchor("center"),
                scale(2),
                z(9),
                "fieryNPC",
              ]);

              // Cutscene over — Rufus can take damage again
              isInvincible = false;
            });
          });
        });
      }
    });
  }

  // Fiery NPC follows Rufus and auto-attacks enemies
  onUpdate("fieryNPC", (f) => {
    if (!rufus.exists()) return;
    // Follow Rufus with a lag
    const targetX = rufus.pos.x - 80;
    const targetY = rufus.pos.y;
    f.pos.x += (targetX - f.pos.x) * 3 * dt();
    f.pos.y += (targetY - f.pos.y) * 3 * dt();
    f.flipX = rufus.flipX;
  });

  // Fiery auto-attacks nearby enemies every 2 seconds
  let fieryAttackTimer = 0;
  onUpdate(() => {
    if (!fieryNPC || !fieryNPC.exists()) return;
    fieryAttackTimer += dt();
    if (fieryAttackTimer >= 2) {
      fieryAttackTimer = 0;
      // Find closest enemy
      const enemies = get("enemy");
      let closest = null;
      let closestDist = 200; // Attack range
      enemies.forEach((e) => {
        const dist = Math.abs(e.pos.x - fieryNPC.pos.x) + Math.abs(e.pos.y - fieryNPC.pos.y);
        if (dist < closestDist) {
          closestDist = dist;
          closest = e;
        }
      });
      if (closest) {
        // Fire puff attack!
        const dir = closest.pos.x > fieryNPC.pos.x ? 1 : -1;
        for (let i = 0; i < 4; i++) {
          add([
            rect(rand(4, 8), rand(4, 8)),
            pos(fieryNPC.pos.x + dir * 20, fieryNPC.pos.y - 10 + rand(-10, 10)),
            color(255, rand(50, 150), 0),
            opacity(0.8),
            lifespan(0.4),
            move(dir > 0 ? 0 : 180, rand(100, 200)),
            z(8),
          ]);
        }
        // Destroy the enemy
        for (let j = 0; j < 3; j++) {
          add([
            rect(rand(4, 6), rand(4, 6)),
            pos(closest.pos),
            color(255, rand(100, 200), 0),
            opacity(1),
            lifespan(0.4),
            move(rand(0, 360), rand(80, 150)),
            z(5),
          ]);
        }
        score += 50;
        scoreText.text = `Treats: ${score}`;
        destroy(closest);
      }
    }
  });

  // --- NPC FRIENDS (Secret level: all friends join!) ---
  if (level.npcFriends) {
    const friendSprites = { marthina: "marthina", renard: "renard", fiery: "fiery" };
    const friendOffsets = { marthina: -70, renard: -140, fiery: -210 };
    level.npcFriends.forEach((name) => {
      const npc = add([
        sprite(friendSprites[name]),
        pos(playerSpawn.x + friendOffsets[name], playerSpawn.y || 0),
        anchor("center"),
        scale(2),
        z(9),
        "friendNPC",
        { friendName: name },
      ]);
    });

    // Friends follow Rufus with a lag (each at different distance)
    let friendIdx = 0;
    onUpdate("friendNPC", (f) => {
      if (!rufus.exists()) return;
      const offset = f.friendName === "marthina" ? -70 : f.friendName === "renard" ? -140 : -210;
      const targetX = rufus.pos.x + offset;
      const targetY = rufus.pos.y;
      f.pos.x += (targetX - f.pos.x) * 2.5 * dt();
      f.pos.y += (targetY - f.pos.y) * 2.5 * dt();
      f.flipX = rufus.flipX;
    });
  }

  // --- BOSS ARENA BACKGROUND (roller coaster with clowns!) ---
  if (level.isBossFight) {
    // Roller coaster track in the background
    for (let tx = 0; tx < level.width; tx += 30) {
      const hill = Math.sin(tx * 0.008) * 60 + Math.sin(tx * 0.015) * 30;
      const ty = 130 + hill;
      add([ rect(32, 4), pos(tx, ty), color(120, 120, 130), opacity(0.3), z(-7) ]);
      if (tx % 120 === 0) {
        add([ rect(3, 400 - ty), pos(tx + 14, ty + 4), color(100, 100, 110), opacity(0.2), z(-8) ]);
      }
    }

    // Clowns riding the coaster!
    for (let r = 0; r < 3; r++) {
      const cart = add([
        rect(18, 10), pos(r * 400 + 100, 130),
        color(220, 50 + r * 80, 50), opacity(0.45), z(-6),
        "bossCoasterCart",
        { trackX: r * 400 + 100, speed: 60 + r * 15, dir: 1 },
      ]);
      const rider = add([
        sprite("clown"), pos(r * 400 + 100, 120),
        anchor("bot"), scale(1), opacity(0.45), z(-6),
        "bossCoasterRider", { cart: cart },
      ]);
    }

    onUpdate("bossCoasterCart", (cart) => {
      cart.trackX += cart.speed * cart.dir * dt();
      if (cart.trackX > level.width - 50) cart.dir = -1;
      if (cart.trackX < 50) cart.dir = 1;
      const hill = Math.sin(cart.trackX * 0.008) * 60 + Math.sin(cart.trackX * 0.015) * 30;
      cart.pos.x = cart.trackX;
      cart.pos.y = 130 + hill;
    });

    // Spawn a new clown rider every 3 seconds!
    loop(3, () => {
      const startX = rand(50, level.width - 50);
      const newCart = add([
        rect(18, 10), pos(startX, 130),
        color(rand(100, 255), rand(50, 200), rand(50, 200)), opacity(0.45), z(-6),
        "bossCoasterCart",
        { trackX: startX, speed: rand(50, 90), dir: rand(0, 1) > 0.5 ? 1 : -1 },
      ]);
      add([
        sprite("clown"), pos(startX, 120),
        anchor("bot"), scale(1), opacity(0.45), z(-6),
        "bossCoasterRider", { cart: newCart },
      ]);
    });

    onUpdate("bossCoasterRider", (rider) => {
      if (!rider.cart || !rider.cart.exists()) { destroy(rider); return; }
      rider.pos.x = rider.cart.pos.x + 3;
      rider.pos.y = rider.cart.pos.y - 2;
      rider.flipX = rider.cart.dir < 0;
    });
  }

  // --- BOSS FIGHT (Level 6: King Clown!) ---
  if (level.isBossFight) {
    let bossHP = 3;
    let bossState = "flying"; // flying, diving, stunned
    let bossTimer = 0;
    let bossSpeed = 70;
    let bossDir = 1;
    let bossHitCooldown = 0;
    let bossDefeated = false;

    // Destroy the exit flag — it spawns back after boss is defeated
    get("exit").forEach((e) => { destroy(e); });

    // Spawn the King Clown!
    const boss = add([
      sprite("bossClown"),
      pos(width() / 2, 150),
      anchor("center"),
      scale(3),
      area(),
      z(10),
      "boss",
      { bossHP: bossHP },
    ]);

    // Boss HP bar
    const bossBarBG = add([
      rect(300, 22),
      pos(width() / 2 - 150, 12),
      color(40, 0, 0),
      outline(2, rgb(100, 50, 50)),
      fixed(),
      z(100),
    ]);
    const bossBarFill = add([
      rect(294, 16),
      pos(width() / 2 - 147, 15),
      color(255, 30, 30),
      fixed(),
      z(101),
    ]);
    add([
      text("KING CLOWN", { size: 12 }),
      pos(width() / 2, 23),
      anchor("center"),
      color(255, 255, 255),
      fixed(),
      z(102),
    ]);

    // "FIGHT!" intro text
    const fightText = add([
      text("FIGHT!", { size: 56 }),
      pos(width() / 2, height() / 2),
      anchor("center"),
      color(255, 50, 0),
      outline(3, rgb(0, 0, 0)),
      opacity(1),
      lifespan(2),
      fixed(),
      z(200),
    ]);

    // Boss AI loop
    onUpdate(() => {
      if (bossDefeated || !boss.exists()) return;
      if (bossHitCooldown > 0) bossHitCooldown -= dt();
      bossTimer += dt();

      if (bossState === "flying") {
        // Fly back and forth across the arena
        boss.pos.x += bossDir * bossSpeed * dt();
        boss.pos.y = 120 + Math.sin(time() * 2) * 30;

        // Bounce at arena edges
        if (boss.pos.x > level.width - 80) bossDir = -1;
        if (boss.pos.x < 80) bossDir = 1;
        boss.flipX = bossDir < 0;

        // Jetpack fire particles
        if (Math.random() < 0.4) {
          add([
            rect(rand(3, 6), rand(3, 6)),
            pos(boss.pos.x + rand(-15, 15), boss.pos.y + 50),
            color(255, rand(50, 150), 0),
            opacity(0.7),
            lifespan(0.3),
            move(270, rand(50, 120)),
            z(9),
          ]);
        }

        // After flying for a bit, DIVE at Rufus!
        if (bossTimer > 3.5) {
          bossState = "diving";
          bossTimer = 0;
          // Aim at where Rufus is now
          boss.diveTargetX = rufus.pos.x;
        }
      } else if (bossState === "diving") {
        // Dive down toward Rufus's last position!
        const targetY = height() - 80;
        boss.pos.y += 280 * dt();
        // Move toward the target X
        const dx = boss.diveTargetX - boss.pos.x;
        boss.pos.x += Math.sign(dx) * Math.min(Math.abs(dx), 300 * dt());

        // Big dive fire trail
        for (let i = 0; i < 2; i++) {
          add([
            rect(rand(4, 8), rand(4, 8)),
            pos(boss.pos.x + rand(-20, 20), boss.pos.y - 20),
            color(255, rand(100, 200), 0),
            opacity(0.8),
            lifespan(0.4),
            move(90, rand(30, 80)),
            z(9),
          ]);
        }

        // CRASH! Hit the ground
        if (boss.pos.y >= targetY) {
          boss.pos.y = targetY;
          bossState = "stunned";
          bossTimer = 0;

          // Screen shake effect — spawn impact particles
          for (let i = 0; i < 12; i++) {
            add([
              rect(rand(4, 10), rand(4, 10)),
              pos(boss.pos.x + rand(-40, 40), boss.pos.y + rand(-10, 10)),
              color(200, 180, 120),
              opacity(0.8),
              lifespan(0.5),
              move(rand(0, 360), rand(100, 300)),
              z(11),
            ]);
          }

          // "CRASH!" text
          add([
            text("CRASH!", { size: 36 }),
            pos(boss.pos.x, boss.pos.y - 60),
            anchor("center"),
            color(255, 200, 0),
            outline(2, rgb(0, 0, 0)),
            opacity(1),
            lifespan(1),
            z(150),
          ]);
        }
      } else if (bossState === "stunned") {
        // Boss is stunned on the ground — stars spinning!
        boss.angle = Math.sin(time() * 10) * 15;

        // Stars around head
        if (Math.random() < 0.2) {
          add([
            text("*", { size: rand(12, 20) }),
            pos(boss.pos.x + rand(-30, 30), boss.pos.y - 50 + rand(-10, 10)),
            color(255, 255, 0),
            opacity(0.8),
            lifespan(0.5),
            move(rand(0, 360), rand(20, 50)),
            z(12),
          ]);
        }

        // After 3 seconds, recover and fly again (faster!)
        if (bossTimer > 3) {
          bossState = "flying";
          bossTimer = 0;
          boss.angle = 0;
          boss.pos.y = 150;
          // Spawn little clown minions after each recovery!
          if (bossHP > 0) {
            for (let m = 0; m < (4 - bossHP); m++) {
              add([
                sprite("clown"),
                pos(rand(100, level.width - 100), 535),
                area(), anchor("bot"), z(1),
                "clown", "enemy",
                { startX: rand(100, level.width - 100), startY: 535,
                  patrol: 80, speed: 50 + (3 - bossHP) * 15, dir: 1,
                  enemyType: "clown", isDisarmed: false, isWasp: false, isClown: true,
                  isDiving: false, diveTimer: 0 },
              ]);
            }
          }
        }
      }
    });

    // Rufus jumps on the boss while stunned!
    rufus.onCollide("boss", () => {
      if (bossDefeated || bossHitCooldown > 0) return;

      if (bossState === "stunned" && (rufus.pos.y < boss.pos.y - 30 || rufus.isSpinning)) {
        // HIT! Jump on his head or tail spin him while stunned!
        bossHP--;
        bossHitCooldown = 1;
        rufus.jump(jumpForce * 0.8);

        // Update boss HP bar
        bossBarFill.width = 294 * (bossHP / 3);

        // Hit flash — confetti burst!
        for (let i = 0; i < 15; i++) {
          const cc = [[255,0,0],[0,200,0],[0,100,255],[255,255,0],[255,100,200],[255,165,0]][i % 6];
          add([
            rect(rand(4, 10), rand(4, 10)),
            pos(boss.pos.x + rand(-30, 30), boss.pos.y + rand(-30, 10)),
            color(...cc),
            opacity(1),
            lifespan(0.6),
            move(rand(0, 360), rand(100, 350)),
            z(15),
          ]);
        }

        // Boss text reaction
        const reactions = ["HONK?!", "OUCH!", "NOOO!"];
        add([
          text(reactions[2 - bossHP] || "!", { size: 28 }),
          pos(boss.pos.x, boss.pos.y - 80),
          anchor("center"),
          color(255, 50, 50),
          outline(2, rgb(0, 0, 0)),
          opacity(1),
          lifespan(1.2),
          z(150),
        ]);

        // Boss gets a little faster after each hit
        bossSpeed += 25;

        if (bossHP <= 0) {
          // BOSS DEFEATED!
          bossDefeated = true;
          boss.angle = 0;
          bossBarFill.width = 0;

          // CONFETTI EXPLOSION!!! As many as possible without crashing!
          // Wave 1 — instant burst from the boss
          for (let i = 0; i < 150; i++) {
            const cc = [[255,0,0],[0,200,0],[0,100,255],[255,255,0],[255,100,200],[255,165,0],[255,128,0],[200,0,255]][i % 8];
            add([
              rect(rand(4, 16), rand(4, 16)),
              pos(boss.pos.x + rand(-80, 80), boss.pos.y + rand(-80, 80)),
              color(...cc),
              opacity(1),
              lifespan(2.5),
              move(rand(0, 360), rand(80, 600)),
              z(20),
            ]);
          }
          // Wave 2 — delayed second burst (even bigger!)
          wait(0.3, () => {
            for (let i = 0; i < 150; i++) {
              const cc = [[255,0,0],[0,200,0],[0,100,255],[255,255,0],[255,100,200],[255,165,0]][i % 6];
              add([
                rect(rand(3, 12), rand(3, 12)),
                pos(rand(0, width()), rand(0, height())),
                color(...cc),
                opacity(1),
                lifespan(2),
                move(rand(0, 360), rand(100, 500)),
                fixed(),
                z(20),
              ]);
            }
          });
          // Wave 3 — third burst from edges!
          wait(0.6, () => {
            for (let i = 0; i < 100; i++) {
              const cc = [[255,50,50],[50,255,50],[50,50,255],[255,255,50],[255,50,255]][i % 5];
              const side = i % 2 === 0 ? -10 : width() + 10;
              add([
                rect(rand(4, 14), rand(4, 14)),
                pos(side, rand(0, height())),
                color(...cc),
                opacity(1),
                lifespan(2.5),
                move(side < 0 ? rand(330, 390) : rand(150, 210), rand(100, 400)),
                fixed(),
                z(20),
              ]);
            }
          });

          // MEGA confetti rain — dense shower that doesn't stop!
          loop(0.05, () => {
            if (!bossDefeated) return;
            for (let i = 0; i < 3; i++) {
              const cc = [[255,0,0],[0,200,0],[0,100,255],[255,255,0],[255,100,200],[255,165,0],[200,0,255],[0,255,255]][Math.floor(rand(0, 8))];
              add([
                rect(rand(3, 12), rand(3, 12)),
                pos(rand(0, width()), -10),
                color(...cc),
                opacity(0.9),
                lifespan(2.5),
                move(rand(65, 115), rand(100, 250)),
                fixed(),
                z(20),
              ]);
            }
          });

          // "VICTORY!" text
          add([
            text("VICTORY!", { size: 52 }),
            pos(width() / 2, height() / 2 - 50),
            anchor("center"),
            color(255, 215, 0),
            outline(3, rgb(0, 0, 0)),
            opacity(1),
            fixed(),
            z(200),
            { t: 0 },
          ]).onUpdate(function() {
            this.t += dt();
            this.opacity = Math.sin(this.t * 3) * 0.2 + 0.8;
          });

          // Destroy the boss and all remaining clown minions
          destroy(boss);
          get("clown").forEach((c) => {
            if (c.exists()) destroy(c);
          });

          // Spawn the exit flag!
          wait(2, () => {
            add([
              sprite("flag"),
              pos(level.exit.x, level.exit.y),
              area(),
              anchor("bot"),
              z(1),
              "exit",
            ]);
            add([
              text("The exit has appeared!", { size: 20 }),
              pos(width() / 2, height() / 2),
              anchor("center"),
              color(255, 200, 100),
              outline(2, rgb(0, 0, 0)),
              opacity(1),
              lifespan(3),
              fixed(),
              z(150),
            ]);
          });
        }
      } else if (bossState !== "stunned") {
        // Boss hit Rufus while NOT stunned — ouch!
        hurtRufus();
      }
    });
  }

  // --- HUD (Heads Up Display) ---
  const scoreText = add([
    text(`Treats: ${score}`, { size: 20 }),
    pos(20, 20),
    color(255, 255, 255),
    outline(2, rgb(0, 0, 0)),
    fixed(),
    z(100),
  ]);

  const livesText = add([
    text(`Lives: ${"🦊".repeat(lives)}`, { size: 20 }),
    pos(20, 50),
    color(255, 255, 255),
    outline(2, rgb(0, 0, 0)),
    fixed(),
    z(100),
  ]);

  const levelText = add([
    text(isSecret ? "SECRET LEVEL" : `Ch.${levelIndex + 1}: ${level.name}`, { size: 16 }),
    pos(width() - 20, 20),
    anchor("topright"),
    color(255, 200, 100),
    outline(2, rgb(0, 0, 0)),
    fixed(),
    z(100),
  ]);

  // Power indicator (secret level only)
  if (isSecret) {
    powerHUD = add([
      rect(130, 28),
      pos(20, 80),
      color(40, 12, 0),
      opacity(0.6),
      outline(2, rgb(255, 165, 0)),
      fixed(),
      z(100),
    ]);
    powerIcon = add([
      text("Power: SPIN", { size: 14 }),
      pos(26, 86),
      color(255, 165, 0),
      outline(1, rgb(0, 0, 0)),
      fixed(),
      z(101),
    ]);
  }

  // Controls hint (fades away)
  const hint = add([
    text(isSecret ? "Arrows: Move | Up: Jump | Space: Power | Tab: Swap Power" : "Arrows: Move | Up: Jump | Space: Tail Spin!", { size: 14 }),
    pos(width() / 2, height() - 30),
    anchor("center"),
    color(255, 255, 255),
    opacity(1),
    outline(1, rgb(0, 0, 0)),
    fixed(),
    z(100),
  ]);
  wait(4, () => {
    if (hint.exists()) hint.opacity = 0;
  });
});

    { // Level 1 - warm sunset backyard victory
      bg: [255, 200, 100],

      message: "Rufus conquered the backyard! The squirrels are shaking in their tiny boots.",
      rufusColor: [255, 165, 0],

    { // Level 2 - night sky celebration
      bg: [20, 20, 60],
      title: "Neighborhood Hero!",
      message: "The armored squirrels have been defeated! Rufus rules the neighborhood!",
      rufusColor: [100, 200, 255],

    { // Level 3 - gym victory, bright lights
      bg: [240, 230, 200],
      title: "Gym Champion!",

      bg: [60, 40, 20],

      bg: [40, 20, 60],
      title: "Theme Park Legend!",

      rufusColor: [255, 200, 50],

      bg: [80, 30, 50],

  if (levelIndex === 1) {

      add([
        rect(2, 2),
        pos(rand(0, width()), rand(0, height() * 0.5)),
        color(255, 255, rand(200, 255)),
        fixed(),
        { t: rand(0, 6.28) },
      ]).onUpdate(function() {
        this.t += dt() * rand(1, 3);
        this.opacity = Math.sin(this.t) * 0.3 + 0.7;
      });
    }
  }

  // Victory title
  add([
    text(theme.title, { size: 44 }),
    pos(width() / 2, 80),
    anchor("center"),
    color(255, 215, 0),
    fixed(),
  ]);

  // Happy Rufus bouncing with joy!
  const victoryFox = add([
    sprite("rufus"),
    pos(width() / 2, 220),
    anchor("center"),
    scale(5),
    fixed(),
  ]);
  // Rufus jumps for joy!
  victoryFox.onUpdate(() => {
    victoryFox.pos.y = 220 + Math.abs(Math.sin(time() * 4)) * -30;
    victoryFox.angle = Math.sin(time() * 3) * 10;
  });

  // Victory particles
  loop(0.3, () => {
    add([
      rect(rand(4, 8), rand(4, 8)),
      pos(rand(100, width() - 100), rand(100, 350)),
      color(255, 215, 0),
      opacity(0.8),
      lifespan(0.8),
      move(rand(0, 360), rand(30, 80)),
      fixed(),
    ]);
  });

  // Score
  add([
    text(`Treats collected: ${score}`, { size: 24 }),
    pos(width() / 2, 340),
    anchor("center"),
    color(255, 255, 255),
    fixed(),
  ]);

  // Level-specific message
  add([
    text(theme.message, { size: 14, width: 500 }),
    pos(width() / 2, 390),
    anchor("center"),
    color(220, 220, 200),
    fixed(),
  ]);

  // Rating based on treats
  const stars = score >= 300 ? 3 : score >= 150 ? 2 : 1;
  const starText = "* ".repeat(stars) + ". ".repeat(3 - stars);
  add([
    text(starText, { size: 40 }),
    pos(width() / 2, 440),
    anchor("center"),
    color(255, 215, 0),
    fixed(),
  ]);

  // Gem and paw awards
  let awardY = 470;
  if (earnedGem) {
    add([
      text("GEM EARNED! No deaths!", { size: 18 }),
      pos(width() / 2, awardY),
      anchor("center"),
      color(0, 206, 209),
      fixed(),
    ]);
    // Gem sparkle
    add([ sprite("gem"), pos(width() / 2 - 130, awardY), anchor("center"), scale(2), fixed() ]);
    awardY += 25;
  } else if (hasGem(levelIndex)) {
    add([
      text("Gem: Collected", { size: 14 }),
      pos(width() / 2, awardY),
      anchor("center"),
      color(100, 150, 150),
      opacity(0.6),
      fixed(),
    ]);
    awardY += 25;
  }

  if (pawCollectedThisRun) {
    add([
      text("GOLDEN PAW FOUND!", { size: 18 }),
      pos(width() / 2, awardY),
      anchor("center"),
      color(255, 215, 0),
      fixed(),
    ]);
    add([ sprite("goldenPaw"), pos(width() / 2 - 120, awardY), anchor("center"), scale(2), fixed() ]);
    awardY += 25;
  } else if (hasPaw(levelIndex)) {
    add([
      text("Golden Paw: Found", { size: 14 }),
      pos(width() / 2, awardY),
      anchor("center"),
      color(150, 130, 80),
      opacity(0.6),
      fixed(),
    ]);
    awardY += 25;
  }

  // Check if all paws just got collected — secret unlock!
  if (pawCollectedThisRun && allPawsCollected()) {
    const secretMsg = add([
      text("Something secret has been unlocked...", { size: 16 }),
      pos(width() / 2, awardY + 5),
      anchor("center"),
      color(255, 215, 0),
      fixed(),
      { t: 0 },
    ]);
    secretMsg.onUpdate(function() {
      this.t += dt();
      this.opacity = Math.sin(this.t * 2) * 0.3 + 0.7;
    });
  }

  // Full screen tap target
  const tapTarget = add([
    rect(width(), height()), pos(0, 0), opacity(0), fixed(), area(), z(-1),
  ]);

  if (nextLevel < ALL_LEVELS.length) {
    add([
      text(isTouchLC ? "Tap for next chapter!" : "Press ENTER for next chapter!", { size: 20 }),
      pos(width() / 2, 510),
      anchor("center"),
      color(255, 200, 100),
      fixed(),
      { t: 0 },
    ]).onUpdate(function() { this.t += dt(); this.opacity = Math.sin(this.t * 3) * 0.4 + 0.6; });
    onKeyPress("enter", () => go("memoir", nextLevel));
    tapTarget.onClick(() => go("memoir", nextLevel));
  } else {
    add([
      text("You've completed all chapters!", { size: 22 }),
      pos(width() / 2, 500),
      anchor("center"),
      color(255, 215, 0),
      fixed(),
    ]);
    add([
      text("Rufus is the ultimate fox!", { size: 16 }),
      pos(width() / 2, 535),
      anchor("center"),
      color(200, 180, 140),
      fixed(),
    ]);
    tapTarget.onClick(() => go("levelSelect"));
  }

  onKeyPress("escape", () => go("levelSelect"));
});

// ============================================
// GAME OVER
// ============================================
scene("gameOver", ({ score, levelIndex }) => {
  const isTouchGO = ("ontouchstart" in window) || navigator.maxTouchPoints > 0;

  // Dark cozy night background
  add([rect(width(), height()), pos(0, 0), color(15, 10, 30), fixed()]);

  // Gentle stars
  for (let i = 0; i < 30; i++) {
    add([
      rect(2, 2),
      pos(rand(0, width()), rand(0, height() * 0.4)),
      color(255, 255, rand(200, 255)),
      opacity(rand(0.2, 0.6)),
      fixed(),
    ]);
  }

  // Moon
  add([
    rect(60, 60),
    pos(width() - 120, 60),
    color(255, 250, 200),
    opacity(0.3),
    fixed(),
  ]);
  add([
    rect(50, 50),
    pos(width() - 115, 65),
    color(255, 250, 220),
    opacity(0.5),
    fixed(),
  ]);

  // Title
  const isSecretGO = (levelIndex === "secret");
  add([
    text(isSecretGO ? "Party's Over..." : "Nap Time...", { size: 48 }),
    pos(width() / 2, 100),
    anchor("center"),
    color(150, 130, 200),
    fixed(),
  ]);

  // Sleeping Rufus (big, centered)
  const sleepyFox = add([
    sprite("rufus_sleep"),
    pos(width() / 2, 250),
    anchor("center"),
    scale(6),
    fixed(),
  ]);
  // Gentle breathing animation
  sleepyFox.onUpdate(() => {
    sleepyFox.scale = vec2(6 + Math.sin(time() * 1.5) * 0.15, 6 - Math.sin(time() * 1.5) * 0.1);
  });

  // Floating Z's
  let zTimer = 0;
  onUpdate(() => {
    zTimer += dt();
    if (zTimer > 1.2) {
      zTimer = 0;
      const z = add([
        text("z", { size: rand(16, 28) }),
        pos(width() / 2 + rand(20, 60), 220),
        color(180, 170, 220),
        opacity(0.8),
        fixed(),
        lifespan(2.5),
        { t: 0 },
      ]);
      z.onUpdate(() => {
        if (!z.exists()) return;
        z.t += dt();
        z.pos.x += 15 * dt();
        z.pos.y -= 30 * dt();
        z.opacity = Math.max(0, 0.8 - z.t * 0.35);
      });
    }
  });

  // Cozy message
  add([
    text("Rufus needs to recharge his tail powers...", { size: 16 }),
    pos(width() / 2, 340),
    anchor("center"),
    color(180, 160, 200),
    fixed(),
  ]);

  add([
    text("He'll be back stronger after a good nap!", { size: 14 }),
    pos(width() / 2, 370),
    anchor("center"),
    color(150, 140, 180),
    fixed(),
  ]);

  // Treats collected
  add([
    text(`Treats saved: ${score}`, { size: 22 }),
    pos(width() / 2, 420),
    anchor("center"),
    color(255, 200, 100),
    fixed(),
  ]);

  // Retry prompt
  add([
    text(isTouchGO ? "Tap to wake Rufus up!" : "Press ENTER to wake Rufus up!", { size: 18 }),
    pos(width() / 2, 490),
    anchor("center"),
    color(255, 165, 0),
    fixed(),
    { t: 0 },
  ]).onUpdate(function() { this.t += dt(); this.opacity = Math.sin(this.t * 2) * 0.3 + 0.7; });

  // Little ground/blanket for Rufus
  add([
    rect(200, 8),
    pos(width() / 2 - 100, 280),
    color(80, 60, 40),
    fixed(),
  ]);

  // Full screen tap target
  const retryBtn = add([
    rect(width(), height()), pos(0, 0), opacity(0), fixed(), area(), z(-1),
  ]);
  retryBtn.onClick(() => go("memoir", levelIndex));

  onKeyPress("enter", () => go("memoir", levelIndex));
  onKeyPress("escape", () => go("levelSelect"));
});

// ============================================
// SECRET LEVEL COMPLETE - The Ultimate Fox Party!
// ============================================
scene("secretComplete", ({ score }) => {
  const isTouchSC = ("ontouchstart" in window) || navigator.maxTouchPoints > 0;

  // Warm golden background
  add([rect(width(), height()), pos(0, 0), color(255, 230, 150), fixed()]);

  // Confetti particles
  loop(0.2, () => {
    const colors = [[255,100,100],[100,100,255],[100,255,100],[255,215,0],[255,150,255]];
    const c = colors[Math.floor(rand(0, colors.length))];
    add([
      rect(rand(4, 10), rand(4, 10)),
      pos(rand(0, width()), -10),
      color(...c),
      opacity(0.9),
      lifespan(3),
      move(rand(70, 110), rand(60, 150)),
      fixed(),
    ]);
  });

  // Title
  add([
    text("The Ultimate Fox Party!", { size: 40 }),
    pos(width() / 2, 60),
    anchor("center"),
    color(200, 80, 0),
    fixed(),
  ]);

  // All four friends bouncing together!
  const characters = [
    { sprite: "rufus", x: width() / 2 - 120, phase: 0 },
    { sprite: "marthina", x: width() / 2 - 40, phase: 1 },
    { sprite: "renard", x: width() / 2 + 40, phase: 2 },
    { sprite: "fiery", x: width() / 2 + 120, phase: 3 },
  ];

  characters.forEach((ch) => {
    const spr = add([
      sprite(ch.sprite),
      pos(ch.x, 220),
      anchor("center"),
      scale(4),
      fixed(),
    ]);
    spr.onUpdate(() => {
      spr.pos.y = 220 + Math.abs(Math.sin(time() * 3 + ch.phase)) * -25;
      spr.angle = Math.sin(time() * 2 + ch.phase) * 8;
    });
  });

  // Party message
  add([
    text("Rufus and all his friends are together at last!", { size: 16, width: 500 }),
    pos(width() / 2, 340),
    anchor("center"),
    color(120, 60, 0),
    fixed(),
  ]);

  add([
    text("The best adventure is the one with friends by your side.", { size: 14, width: 500 }),
    pos(width() / 2, 380),
    anchor("center"),
    color(150, 100, 50),
    fixed(),
  ]);

  // Score
  add([
    text(`Party treats collected: ${score}`, { size: 22 }),
    pos(width() / 2, 430),
    anchor("center"),
    color(200, 100, 0),
    fixed(),
  ]);

  // Special badge
  add([
    text("SECRET LEVEL COMPLETE!", { size: 28 }),
    pos(width() / 2, 480),
    anchor("center"),
    color(255, 215, 0),
    outline(2, rgb(150, 100, 0)),
    fixed(),
    { t: 0 },
  ]).onUpdate(function() {
    this.t += dt();
    this.opacity = Math.sin(this.t * 2) * 0.2 + 0.8;
  });

  // Back button
  add([
    text(isTouchSC ? "Tap to return to Journal" : "Press ENTER to return to Journal", { size: 16 }),
    pos(width() / 2, 540),
    anchor("center"),
    color(180, 120, 50),
    fixed(),
    { t: 0 },
  ]).onUpdate(function() { this.t += dt(); this.opacity = Math.sin(this.t * 3) * 0.3 + 0.7; });

  const tapTarget = add([
    rect(width(), height()), pos(0, 0), opacity(0), fixed(), area(), z(-1),
  ]);
  tapTarget.onClick(() => go("levelSelect"));
  onKeyPress("enter", () => go("levelSelect"));
  onKeyPress("escape", () => go("levelSelect"));
});

// ============================================
// JETPACK UNLOCK SCENE
// ============================================
scene("jetpackUnlock", ({ score, levelIndex, earnedGem, pawCollectedThisRun }) => {
  const isTouchJP = ("ontouchstart" in window) || navigator.maxTouchPoints > 0;

  // Dark dramatic background
  add([rect(width(), height()), pos(0, 0), color(20, 10, 40), fixed()]);

  // Stars
  for (let i = 0; i < 40; i++) {
    const star = add([
      rect(2, 2),
      pos(rand(0, width()), rand(0, height() * 0.5)),
      color(255, 255, rand(200, 255)),
      opacity(rand(0.3, 0.7)),
      fixed(),
      { t: rand(0, 6.28) },
    ]);
    star.onUpdate(() => {
      star.t += dt() * 2;
      star.opacity = Math.sin(star.t) * 0.3 + 0.5;
    });
  }

  // "NEW UNLOCK!" title
  add([
    text("NEW UNLOCK!", { size: 48 }),
    pos(width() / 2, 70),
    anchor("center"),
    color(255, 215, 0),
    outline(3, rgb(150, 100, 0)),
    fixed(),
    { t: 0 },
  ]).onUpdate(function() {
    this.t += dt();
    this.scale = vec2(1 + Math.sin(this.t * 3) * 0.05);
  });

  // Jetpack image (using the boss clown sprite flipped as a trophy)
  // Big jetpack icon made of rects
  const jpX = width() / 2;
  const jpY = 220;
  // Jetpack body
  add([ rect(40, 60), pos(jpX - 20, jpY - 30), color(140, 140, 150), fixed(), z(1) ]);
  add([ rect(36, 56), pos(jpX - 18, jpY - 28), color(160, 160, 170), fixed(), z(2) ]);
  // Nozzles
  add([ rect(12, 20), pos(jpX - 18, jpY + 30), color(120, 120, 130), fixed(), z(1) ]);
  add([ rect(12, 20), pos(jpX + 6, jpY + 30), color(120, 120, 130), fixed(), z(1) ]);
  // Flames!
  const flame1 = add([
    rect(10, 16), pos(jpX - 17, jpY + 50),
    color(255, 100, 0), opacity(0.9), fixed(), z(1), { t: 0 },
  ]);
  const flame2 = add([
    rect(10, 16), pos(jpX + 7, jpY + 50),
    color(255, 100, 0), opacity(0.9), fixed(), z(1), { t: 1 },
  ]);
  flame1.onUpdate(() => {
    flame1.t += dt() * 8;
    flame1.height = 16 + Math.sin(flame1.t) * 6;
    flame1.color = rgb(255, 100 + Math.sin(flame1.t) * 50, 0);
  });
  flame2.onUpdate(() => {
    flame2.t += dt() * 8;
    flame2.height = 16 + Math.sin(flame2.t) * 6;
    flame2.color = rgb(255, 100 + Math.sin(flame2.t) * 50, 0);
  });
  // Straps
  add([ rect(4, 30), pos(jpX - 8, jpY - 50), color(100, 70, 40), fixed(), z(0) ]);
  add([ rect(4, 30), pos(jpX + 4, jpY - 50), color(100, 70, 40), fixed(), z(0) ]);

  // Spark particles around the jetpack
  loop(0.2, () => {
    add([
      rect(rand(2, 5), rand(2, 5)),
      pos(jpX + rand(-30, 30), jpY + rand(-40, 40)),
      color(255, 215, rand(50, 200)),
      opacity(0.8),
      lifespan(0.5),
      move(rand(0, 360), rand(30, 80)),
      fixed(),
    ]);
  });

  // Description
  add([
    text("JETPACK UNLOCKED!", { size: 32 }),
    pos(width() / 2, 320),
    anchor("center"),
    color(255, 150, 0),
    outline(2, rgb(0, 0, 0)),
    fixed(),
  ]);

  add([
    text("You took the King Clown's jetpack!", { size: 16 }),
    pos(width() / 2, 365),
    anchor("center"),
    color(220, 200, 160),
    fixed(),
  ]);

  add([
    text("Press UP while in the air to BOOST!", { size: 18 }),
    pos(width() / 2, 400),
    anchor("center"),
    color(255, 200, 100),
    fixed(),
  ]);

  add([
    text("Works in ALL levels! You get 3 boosts per jump.", { size: 14 }),
    pos(width() / 2, 430),
    anchor("center"),
    color(180, 170, 140),
    fixed(),
  ]);

  // Continue prompt
  add([
    text(isTouchJP ? "Tap to continue!" : "Press ENTER to continue!", { size: 18 }),
    pos(width() / 2, 510),
    anchor("center"),
    color(255, 200, 100),
    fixed(),
    { t: 0 },
  ]).onUpdate(function() { this.t += dt(); this.opacity = Math.sin(this.t * 3) * 0.3 + 0.7; });

  const tapTarget = add([
    rect(width(), height()), pos(0, 0), opacity(0), fixed(), area(), z(-1),
  ]);
  tapTarget.onClick(() => go("levelComplete", { score, levelIndex, earnedGem, pawCollectedThisRun }));
  onKeyPress("enter", () => go("levelComplete", { score, levelIndex, earnedGem, pawCollectedThisRun }));
});

// ============================================
// START THE GAME!
// ============================================
go("title");

</script>
