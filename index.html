<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Adventures of Rufus 🦊</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; touch-action: none; }
    canvas { display: block; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; }
  </style>
</head>
<body>

<!-- Load level data -->
<script src="levels/level1.js"></script>
<script src="levels/level2.js"></script>

<!-- Load Kaplay game engine -->
<script src="https://unpkg.com/kaplay@3001/dist/kaplay.js"></script>

<script>
// ============================================
// 🦊 ADVENTURES OF RUFUS
// A game by a young fox lover, built with code!
// ============================================

// --- START THE GAME ENGINE ---
kaplay({
  width: 800,
  height: 600,
  background: [20, 20, 40],
  stretch: true,
  letterbox: true,
  crisp: true,
  touchToMouse: true,
});

// --- TOUCH SETUP ---
// Kaplay's touchToMouse: true handles menu clicks.
// We just need to prevent iOS zoom/scroll gestures on the canvas.
(function setupTouch() {
  function setup() {
    const c = document.querySelector("canvas");
    if (!c) { setTimeout(setup, 100); return; }
    c.style.touchAction = "none";
  }
  setup();
})();

// --- HOW FAST AND HIGH RUFUS MOVES ---
const foxSpeed = 300;
const jumpForce = 650;
const tailSpinDuration = 0.4;

// All levels in order
const ALL_LEVELS = [LEVEL_1, LEVEL_2];

// --- DRAW RUFUS AS PIXEL ART ---
// This creates a little fox sprite that looks like the real Rufus!
function drawFoxSprite() {
  const c = document.createElement("canvas");
  c.width = 32;
  c.height = 32;
  const ctx = c.getContext("2d");

  // Body (orange)
  ctx.fillStyle = "#D2691E";
  ctx.fillRect(8, 12, 16, 12);

  // Head (orange, rounder)
  ctx.fillStyle = "#D2691E";
  ctx.fillRect(10, 4, 14, 12);

  // Ears (pointy orange)
  ctx.fillStyle = "#D2691E";
  ctx.fillRect(10, 0, 4, 6);
  ctx.fillRect(20, 0, 4, 6);

  // Inner ears (darker)
  ctx.fillStyle = "#A0522D";
  ctx.fillRect(11, 1, 2, 4);
  ctx.fillRect(21, 1, 2, 4);

  // Belly (lighter)
  ctx.fillStyle = "#F4A460";
  ctx.fillRect(12, 16, 10, 6);

  // Eyes (black, bright)
  ctx.fillStyle = "#000";
  ctx.fillRect(13, 7, 3, 3);
  ctx.fillRect(19, 7, 3, 3);

  // Eye shine
  ctx.fillStyle = "#FFF";
  ctx.fillRect(14, 7, 1, 1);
  ctx.fillRect(20, 7, 1, 1);

  // Nose (black)
  ctx.fillStyle = "#000";
  ctx.fillRect(16, 10, 2, 2);

  // BIG TOOTHY GRIN - Rufus's signature!
  ctx.fillStyle = "#FFF";
  ctx.fillRect(12, 13, 2, 2);
  ctx.fillRect(14, 12, 2, 2);
  ctx.fillRect(16, 13, 2, 2);
  ctx.fillRect(18, 12, 2, 2);
  ctx.fillRect(20, 13, 2, 2);

  // Legs
  ctx.fillStyle = "#8B4513";
  ctx.fillRect(10, 24, 4, 6);
  ctx.fillRect(20, 24, 4, 6);

  // Paws (darker)
  ctx.fillStyle = "#5C3317";
  ctx.fillRect(10, 28, 4, 4);
  ctx.fillRect(20, 28, 4, 4);

  // Tail (the famous spinning tail!)
  ctx.fillStyle = "#D2691E";
  ctx.fillRect(2, 14, 6, 4);
  ctx.fillRect(0, 12, 4, 4);

  // White tail tip
  ctx.fillStyle = "#FFFFFF";
  ctx.fillRect(0, 12, 3, 4);

  return c;
}

// --- DRAW RUFUS SPINNING (tail out wide) ---
function drawFoxSpinning() {
  const c = document.createElement("canvas");
  c.width = 40;
  c.height = 32;
  const ctx = c.getContext("2d");

  // Same body but shifted right to make room for extended tail
  const ox = 6;

  // Body
  ctx.fillStyle = "#D2691E";
  ctx.fillRect(ox + 8, 12, 16, 12);

  // Head
  ctx.fillStyle = "#D2691E";
  ctx.fillRect(ox + 10, 4, 14, 12);

  // Ears
  ctx.fillStyle = "#D2691E";
  ctx.fillRect(ox + 10, 0, 4, 6);
  ctx.fillRect(ox + 20, 0, 4, 6);

  ctx.fillStyle = "#A0522D";
  ctx.fillRect(ox + 11, 1, 2, 4);
  ctx.fillRect(ox + 21, 1, 2, 4);

  // Belly
  ctx.fillStyle = "#F4A460";
  ctx.fillRect(ox + 12, 16, 10, 6);

  // Eyes (dizzy spiral look when spinning!)
  ctx.fillStyle = "#000";
  ctx.fillRect(ox + 13, 7, 3, 3);
  ctx.fillRect(ox + 19, 7, 3, 3);
  ctx.fillStyle = "#FFD700";
  ctx.fillRect(ox + 14, 8, 1, 1);
  ctx.fillRect(ox + 20, 8, 1, 1);

  // Nose
  ctx.fillStyle = "#000";
  ctx.fillRect(ox + 16, 10, 2, 2);

  // Grin
  ctx.fillStyle = "#FFF";
  ctx.fillRect(ox + 12, 13, 2, 2);
  ctx.fillRect(ox + 14, 12, 2, 2);
  ctx.fillRect(ox + 16, 13, 2, 2);
  ctx.fillRect(ox + 18, 12, 2, 2);
  ctx.fillRect(ox + 20, 13, 2, 2);

  // Legs
  ctx.fillStyle = "#8B4513";
  ctx.fillRect(ox + 10, 24, 4, 6);
  ctx.fillRect(ox + 20, 24, 4, 6);
  ctx.fillStyle = "#5C3317";
  ctx.fillRect(ox + 10, 28, 4, 4);
  ctx.fillRect(ox + 20, 28, 4, 4);

  // EXTENDED TAIL (spinning!)
  ctx.fillStyle = "#D2691E";
  ctx.fillRect(0, 10, 14, 6);
  // Tail blur lines
  ctx.fillStyle = "#F4A460";
  ctx.fillRect(0, 10, 14, 1);
  ctx.fillRect(0, 15, 14, 1);
  // White tip
  ctx.fillStyle = "#FFF";
  ctx.fillRect(0, 10, 4, 6);

  // Spin effect lines on the right side too
  ctx.fillStyle = "#D2691E";
  ctx.fillRect(ox + 24, 12, 10, 4);
  ctx.fillStyle = "#F4A460";
  ctx.fillRect(ox + 24, 12, 10, 1);
  ctx.fillRect(ox + 24, 15, 10, 1);
  ctx.fillStyle = "#FFF";
  ctx.fillRect(ox + 32, 12, 4, 4);

  return c;
}

// --- DRAW A TREAT (berry) ---
function drawTreat() {
  const c = document.createElement("canvas");
  c.width = 16;
  c.height = 16;
  const ctx = c.getContext("2d");
  // Berry body
  ctx.fillStyle = "#FF4444";
  ctx.fillRect(4, 4, 8, 8);
  ctx.fillRect(2, 6, 12, 4);
  ctx.fillRect(6, 2, 4, 12);
  // Shine
  ctx.fillStyle = "#FF8888";
  ctx.fillRect(5, 5, 2, 2);
  // Leaf
  ctx.fillStyle = "#228B22";
  ctx.fillRect(7, 0, 3, 4);
  ctx.fillRect(10, 1, 2, 2);
  return c;
}

// --- DRAW A CRATE (smashable) ---
function drawCrate() {
  const c = document.createElement("canvas");
  c.width = 32;
  c.height = 32;
  const ctx = c.getContext("2d");
  // Main crate
  ctx.fillStyle = "#8B6914";
  ctx.fillRect(0, 0, 32, 32);
  // Planks
  ctx.fillStyle = "#A0792C";
  ctx.fillRect(2, 2, 28, 12);
  ctx.fillRect(2, 18, 28, 12);
  // Cross boards
  ctx.fillStyle = "#6B4E0A";
  ctx.fillRect(14, 0, 4, 32);
  ctx.fillRect(0, 14, 32, 4);
  // Nails
  ctx.fillStyle = "#888";
  ctx.fillRect(3, 3, 2, 2);
  ctx.fillRect(27, 3, 2, 2);
  ctx.fillRect(3, 27, 2, 2);
  ctx.fillRect(27, 27, 2, 2);
  return c;
}

// --- DRAW A BOUNCE CRATE (springy! helps Rufus reach high places) ---
function drawBounceCrate() {
  const c = document.createElement("canvas");
  c.width = 32;
  c.height = 32;
  const ctx = c.getContext("2d");
  // Main crate (green tinted - looks special!)
  ctx.fillStyle = "#2E7D32";
  ctx.fillRect(0, 0, 32, 32);
  // Planks
  ctx.fillStyle = "#43A047";
  ctx.fillRect(2, 2, 28, 12);
  ctx.fillRect(2, 18, 28, 12);
  // Cross boards
  ctx.fillStyle = "#1B5E20";
  ctx.fillRect(14, 0, 4, 32);
  ctx.fillRect(0, 14, 32, 4);
  // Spring arrow pointing up (so player knows to jump on it!)
  ctx.fillStyle = "#FFD700";
  ctx.fillRect(13, 6, 6, 8);
  ctx.fillRect(10, 8, 12, 4);
  ctx.fillRect(13, 4, 6, 4);
  // Arrow tip
  ctx.fillRect(15, 2, 2, 4);
  return c;
}

// --- DRAW A WALKER ENEMY (squirrel) ---
function drawWalker() {
  const c = document.createElement("canvas");
  c.width = 24;
  c.height = 24;
  const ctx = c.getContext("2d");
  // Body (gray squirrel)
  ctx.fillStyle = "#808080";
  ctx.fillRect(6, 8, 12, 10);
  // Head
  ctx.fillStyle = "#808080";
  ctx.fillRect(8, 2, 10, 8);
  // Ears
  ctx.fillStyle = "#696969";
  ctx.fillRect(8, 0, 3, 4);
  ctx.fillRect(15, 0, 3, 4);
  // Eyes (angry!)
  ctx.fillStyle = "#FF0000";
  ctx.fillRect(10, 4, 2, 2);
  ctx.fillRect(15, 4, 2, 2);
  // Big fluffy tail
  ctx.fillStyle = "#A0A0A0";
  ctx.fillRect(0, 4, 6, 10);
  ctx.fillRect(2, 2, 4, 4);
  // Feet
  ctx.fillStyle = "#555";
  ctx.fillRect(8, 18, 4, 4);
  ctx.fillRect(14, 18, 4, 4);
  return c;
}

// --- DRAW AN ARMORED ENEMY (helmeted squirrel) ---
function drawArmored() {
  const c = document.createElement("canvas");
  c.width = 24;
  c.height = 28;
  const ctx = c.getContext("2d");
  // Helmet!
  ctx.fillStyle = "#C0C0C0";
  ctx.fillRect(6, 0, 14, 8);
  ctx.fillStyle = "#A0A0A0";
  ctx.fillRect(8, 0, 10, 2);
  // Helmet spike
  ctx.fillStyle = "#FFD700";
  ctx.fillRect(12, -2, 3, 4);
  // Body
  ctx.fillStyle = "#808080";
  ctx.fillRect(6, 12, 12, 10);
  // Head (behind helmet visor)
  ctx.fillStyle = "#808080";
  ctx.fillRect(8, 6, 10, 8);
  // Eyes (angry, visible through visor)
  ctx.fillStyle = "#FF0000";
  ctx.fillRect(10, 8, 2, 2);
  ctx.fillRect(15, 8, 2, 2);
  // Visor slit
  ctx.fillStyle = "#333";
  ctx.fillRect(8, 7, 10, 1);
  // Tail
  ctx.fillStyle = "#A0A0A0";
  ctx.fillRect(0, 8, 6, 10);
  ctx.fillRect(2, 6, 4, 4);
  // Feet
  ctx.fillStyle = "#555";
  ctx.fillRect(8, 22, 4, 4);
  ctx.fillRect(14, 22, 4, 4);
  return c;
}

// --- DRAW DISARMED ENEMY (helmet popped off) ---
function drawDisarmed() {
  const c = document.createElement("canvas");
  c.width = 24;
  c.height = 24;
  const ctx = c.getContext("2d");
  // Same as walker but dazed
  ctx.fillStyle = "#808080";
  ctx.fillRect(6, 8, 12, 10);
  ctx.fillStyle = "#808080";
  ctx.fillRect(8, 2, 10, 8);
  ctx.fillStyle = "#696969";
  ctx.fillRect(8, 0, 3, 4);
  ctx.fillRect(15, 0, 3, 4);
  // Dizzy eyes (spirals!)
  ctx.fillStyle = "#FFD700";
  ctx.fillRect(10, 4, 2, 2);
  ctx.fillRect(15, 4, 2, 2);
  ctx.fillStyle = "#FFA500";
  ctx.fillRect(11, 5, 1, 1);
  ctx.fillRect(16, 5, 1, 1);
  // Stars around head (dazed!)
  ctx.fillStyle = "#FFD700";
  ctx.fillRect(6, 0, 2, 2);
  ctx.fillRect(18, 0, 2, 2);
  ctx.fillRect(12, -2, 2, 2);
  // Tail
  ctx.fillStyle = "#A0A0A0";
  ctx.fillRect(0, 4, 6, 10);
  ctx.fillRect(2, 2, 4, 4);
  // Feet
  ctx.fillStyle = "#555";
  ctx.fillRect(8, 18, 4, 4);
  ctx.fillRect(14, 18, 4, 4);
  return c;
}

// --- DRAW EXIT FLAG ---
function drawFlag() {
  const c = document.createElement("canvas");
  c.width = 32;
  c.height = 48;
  const ctx = c.getContext("2d");
  // Pole
  ctx.fillStyle = "#8B4513";
  ctx.fillRect(4, 0, 4, 48);
  // Flag
  ctx.fillStyle = "#FF6600";
  ctx.fillRect(8, 2, 20, 16);
  // Fox paw print on flag
  ctx.fillStyle = "#FFF";
  ctx.fillRect(14, 6, 4, 4);
  ctx.fillRect(12, 4, 2, 2);
  ctx.fillRect(18, 4, 2, 2);
  ctx.fillRect(15, 11, 2, 2);
  return c;
}

// --- DRAW MARTHINA (fluffy Italian fox, cuddly, no teeth) ---
function drawMarthina() {
  const c = document.createElement("canvas");
  c.width = 36;
  c.height = 34;
  const ctx = c.getContext("2d");

  // Fluffy body (rounder, bigger, lighter orange)
  ctx.fillStyle = "#E8A040";
  ctx.fillRect(6, 12, 22, 14);
  ctx.fillRect(4, 14, 26, 10); // Extra width = fluffiness

  // Big white chest/belly (she's very fluffy here)
  ctx.fillStyle = "#FFF8F0";
  ctx.fillRect(10, 14, 14, 10);
  ctx.fillRect(8, 16, 18, 6);

  // Fluffy head (rounder, wider than Rufus)
  ctx.fillStyle = "#E8A040";
  ctx.fillRect(8, 2, 18, 14);
  ctx.fillRect(6, 4, 22, 10); // Extra fluff on sides

  // White face patch (big white muzzle area)
  ctx.fillStyle = "#FFF8F0";
  ctx.fillRect(12, 8, 10, 8);
  ctx.fillRect(10, 10, 14, 4);

  // Fluffy ears (rounder, not as pointy as Rufus)
  ctx.fillStyle = "#E8A040";
  ctx.fillRect(9, 0, 5, 5);
  ctx.fillRect(22, 0, 5, 5);
  ctx.fillStyle = "#D4883A";
  ctx.fillRect(10, 1, 3, 3);
  ctx.fillRect(23, 1, 3, 3);

  // Sweet eyes (rounder, friendlier than Rufus)
  ctx.fillStyle = "#2D5A1E";
  ctx.fillRect(13, 6, 3, 3);
  ctx.fillRect(20, 6, 3, 3);
  // Big eye shine (sparkly!)
  ctx.fillStyle = "#FFF";
  ctx.fillRect(14, 6, 2, 1);
  ctx.fillRect(21, 6, 2, 1);

  // Small pink nose
  ctx.fillStyle = "#FF9999";
  ctx.fillRect(16, 10, 2, 2);

  // Gentle smile (NO teeth - she's sweet not toothy!)
  ctx.fillStyle = "#D4883A";
  ctx.fillRect(14, 12, 2, 1);
  ctx.fillRect(16, 13, 2, 1);
  ctx.fillRect(18, 12, 2, 1);

  // Fluffy cheeks
  ctx.fillStyle = "#FFCCAA";
  ctx.fillRect(10, 9, 2, 2);
  ctx.fillRect(24, 9, 2, 2);

  // Stubby fluffy legs
  ctx.fillStyle = "#D4883A";
  ctx.fillRect(10, 26, 5, 6);
  ctx.fillRect(21, 26, 5, 6);
  // White paws
  ctx.fillStyle = "#FFF8F0";
  ctx.fillRect(10, 30, 5, 2);
  ctx.fillRect(21, 30, 5, 2);

  // Big fluffy tail
  ctx.fillStyle = "#E8A040";
  ctx.fillRect(0, 12, 6, 6);
  ctx.fillRect(-2, 10, 6, 6);
  // White tail tip (bigger than Rufus's)
  ctx.fillStyle = "#FFF8F0";
  ctx.fillRect(-2, 10, 4, 6);

  return c;
}

// --- DRAW RENARD (grumpy French fox, darker, scowling) ---
function drawRenard() {
  const c = document.createElement("canvas");
  c.width = 32;
  c.height = 32;
  const ctx = c.getContext("2d");

  // Body (darker brownish-orange)
  ctx.fillStyle = "#B85C2A";
  ctx.fillRect(8, 12, 16, 12);

  // Head (darker)
  ctx.fillStyle = "#B85C2A";
  ctx.fillRect(10, 4, 14, 12);

  // Dark ear tips (very French fox look)
  ctx.fillStyle = "#B85C2A";
  ctx.fillRect(10, 0, 4, 6);
  ctx.fillRect(20, 0, 4, 6);
  ctx.fillStyle = "#333";
  ctx.fillRect(10, 0, 4, 2);
  ctx.fillRect(20, 0, 4, 2);

  // Inner ears
  ctx.fillStyle = "#8B4513";
  ctx.fillRect(11, 1, 2, 4);
  ctx.fillRect(21, 1, 2, 4);

  // Belly (cream)
  ctx.fillStyle = "#DEB887";
  ctx.fillRect(12, 16, 10, 6);

  // Grumpy eyes (angry eyebrows!)
  ctx.fillStyle = "#000";
  ctx.fillRect(13, 7, 3, 3);
  ctx.fillRect(19, 7, 3, 3);
  // Angry eyebrows slanting down
  ctx.fillStyle = "#333";
  ctx.fillRect(12, 5, 4, 2);
  ctx.fillRect(19, 5, 4, 2);
  ctx.fillRect(13, 6, 2, 1);
  ctx.fillRect(21, 6, 2, 1);

  // Eye glint (even grumps have a spark)
  ctx.fillStyle = "#FFF";
  ctx.fillRect(14, 7, 1, 1);
  ctx.fillRect(20, 7, 1, 1);

  // Nose
  ctx.fillStyle = "#000";
  ctx.fillRect(16, 10, 2, 2);

  // Frown (definitely NOT smiling)
  ctx.fillStyle = "#8B4513";
  ctx.fillRect(13, 13, 2, 1);
  ctx.fillRect(15, 14, 4, 1);
  ctx.fillRect(19, 13, 2, 1);

  // Legs (darker)
  ctx.fillStyle = "#6B3410";
  ctx.fillRect(10, 24, 4, 6);
  ctx.fillRect(20, 24, 4, 6);
  ctx.fillStyle = "#333";
  ctx.fillRect(10, 28, 4, 4);
  ctx.fillRect(20, 28, 4, 4);

  // Tail
  ctx.fillStyle = "#B85C2A";
  ctx.fillRect(2, 14, 6, 4);
  ctx.fillRect(0, 12, 4, 4);
  ctx.fillStyle = "#FFF";
  ctx.fillRect(0, 12, 3, 4);

  return c;
}

// --- DRAW FIERY (baby T-Rex, red/orange, big head, tiny arms) ---
function drawFirey() {
  const c = document.createElement("canvas");
  c.width = 32;
  c.height = 34;
  const ctx = c.getContext("2d");

  // Body (red-orange)
  ctx.fillStyle = "#CC3300";
  ctx.fillRect(8, 12, 16, 14);

  // Belly (lighter, like his ribbed tummy in the photo)
  ctx.fillStyle = "#FFAA66";
  ctx.fillRect(11, 14, 10, 10);
  // Belly ridges
  ctx.fillStyle = "#FF9955";
  ctx.fillRect(11, 16, 10, 1);
  ctx.fillRect(11, 19, 10, 1);
  ctx.fillRect(11, 22, 10, 1);

  // Big head (T-Rex has a big head!)
  ctx.fillStyle = "#CC3300";
  ctx.fillRect(6, 0, 20, 14);

  // Big jaw
  ctx.fillStyle = "#AA2200";
  ctx.fillRect(6, 8, 20, 6);

  // Teeth!! (T-Rex teeth!)
  ctx.fillStyle = "#FFF";
  ctx.fillRect(8, 8, 2, 3);
  ctx.fillRect(12, 8, 2, 3);
  ctx.fillRect(16, 8, 2, 3);
  ctx.fillRect(20, 8, 2, 3);
  ctx.fillRect(24, 8, 2, 3);
  // Bottom teeth
  ctx.fillRect(10, 11, 2, 2);
  ctx.fillRect(14, 11, 2, 2);
  ctx.fillRect(18, 11, 2, 2);
  ctx.fillRect(22, 11, 2, 2);

  // Eyes (round, curious baby eyes)
  ctx.fillStyle = "#FFD700";
  ctx.fillRect(10, 3, 4, 4);
  ctx.fillRect(20, 3, 4, 4);
  ctx.fillStyle = "#000";
  ctx.fillRect(11, 4, 2, 2);
  ctx.fillRect(21, 4, 2, 2);
  ctx.fillStyle = "#FFF";
  ctx.fillRect(12, 4, 1, 1);
  ctx.fillRect(22, 4, 1, 1);

  // Tiny T-Rex arms!
  ctx.fillStyle = "#CC3300";
  ctx.fillRect(4, 16, 4, 3);
  ctx.fillRect(24, 16, 4, 3);
  ctx.fillStyle = "#AA2200";
  ctx.fillRect(3, 18, 2, 2);
  ctx.fillRect(26, 18, 2, 2);

  // Thick legs
  ctx.fillStyle = "#AA2200";
  ctx.fillRect(9, 26, 6, 8);
  ctx.fillRect(19, 26, 6, 8);
  ctx.fillStyle = "#882200";
  ctx.fillRect(9, 30, 6, 4);
  ctx.fillRect(19, 30, 6, 4);

  // Spiky back/head ridges
  ctx.fillStyle = "#FF4400";
  ctx.fillRect(14, -2, 4, 3);
  ctx.fillRect(10, 0, 3, 2);
  ctx.fillRect(19, 0, 3, 2);

  return c;
}

// --- DRAW SLEEPING RUFUS (nap time!) ---
function drawFoxSleeping() {
  const c = document.createElement("canvas");
  c.width = 40;
  c.height = 24;
  const ctx = c.getContext("2d");

  // Body (lying on side)
  ctx.fillStyle = "#D2691E";
  ctx.fillRect(8, 8, 24, 12);

  // Belly
  ctx.fillStyle = "#F4A460";
  ctx.fillRect(12, 12, 16, 6);

  // Head (resting)
  ctx.fillStyle = "#D2691E";
  ctx.fillRect(4, 4, 12, 10);

  // Ears (flopped)
  ctx.fillStyle = "#D2691E";
  ctx.fillRect(4, 2, 3, 4);
  ctx.fillRect(12, 2, 3, 4);
  ctx.fillStyle = "#A0522D";
  ctx.fillRect(5, 3, 1, 2);
  ctx.fillRect(13, 3, 1, 2);

  // Closed eyes (sleeping!)
  ctx.fillStyle = "#000";
  ctx.fillRect(6, 7, 3, 1);
  ctx.fillRect(11, 7, 3, 1);

  // Sleepy smile
  ctx.fillStyle = "#FFF";
  ctx.fillRect(7, 10, 2, 1);
  ctx.fillRect(9, 10, 2, 1);

  // Nose
  ctx.fillStyle = "#000";
  ctx.fillRect(9, 8, 2, 2);

  // Tail curled around body
  ctx.fillStyle = "#D2691E";
  ctx.fillRect(30, 6, 6, 4);
  ctx.fillRect(34, 4, 4, 4);
  ctx.fillRect(36, 2, 3, 4);
  // White tail tip
  ctx.fillStyle = "#FFF";
  ctx.fillRect(37, 2, 2, 3);

  // Little paws tucked in
  ctx.fillStyle = "#5C3317";
  ctx.fillRect(8, 18, 4, 4);
  ctx.fillRect(24, 18, 4, 4);

  return c;
}

// --- LOAD ALL SPRITES ---
loadSprite("rufus", drawFoxSprite().toDataURL());
loadSprite("rufus_spin", drawFoxSpinning().toDataURL());
loadSprite("treat", drawTreat().toDataURL());
loadSprite("crate", drawCrate().toDataURL());
loadSprite("walker", drawWalker().toDataURL());
loadSprite("armored", drawArmored().toDataURL());
loadSprite("disarmed", drawDisarmed().toDataURL());
loadSprite("bounceCrate", drawBounceCrate().toDataURL());

scene("title", () => {
  // Sky background
  add([
    rect(width(), height()),
    pos(0, 0),
    color(20, 20, 60),
    fixed(),
  ]);

  // Stars
  for (let i = 0; i < 50; i++) {
    add([
      rect(2, 2),
      pos(rand(0, width()), rand(0, height() * 0.6)),
      color(255, 255, rand(150, 255)),
      fixed(),
      { twinkleSpeed: rand(1, 3) },
    ]);
  }

  // Title
  add([
    text("Adventures of Rufus", { size: 48 }),
    pos(width() / 2, 120),
    anchor("center"),
    color(255, 165, 0),
    fixed(),
  ]);

  // Subtitle
  add([
    text("Memoirs of a Fox", { size: 24 }),
    pos(width() / 2, 170),
    anchor("center"),
    color(255, 200, 100),
    fixed(),
  ]);

  // Rufus sprite
  const titleFox = add([
    sprite("rufus"),
    pos(width() / 2, 300),
    anchor("center"),

  // Bounce Rufus
  titleFox.onUpdate(() => {
    titleFox.pos.y = 300 + Math.sin(time() * 2) * 15;

  // Detect touch device
  const isTouch = ("ontouchstart" in window) || navigator.maxTouchPoints > 0;

  // Instructions - different text for touch vs keyboard

    anchor("center"),
    color(255, 255, 255),
    fixed(),
    { flashTimer: 0 },

    this.flashTimer += dt();
    this.opacity = Math.sin(this.flashTimer * 3) * 0.4 + 0.6;
  });

  // Controls help
  add([
    text(isTouch ? "On-screen buttons appear during gameplay" : "Arrow Keys: Move & Jump | Space: Tail Spin!", { size: 14 }),
    pos(width() / 2, 500),
    anchor("center"),
    color(180, 180, 180),
    fixed(),

  // About Rufus link - clickable button
  const aboutBtn = add([
    rect(300, 40),
    pos(width() / 2, 545),
    anchor("center"),
    color(255, 165, 0),
    opacity(0.2),
    outline(1, rgb(255, 165, 0)),
    fixed(),
    area(),

  add([
    text(isTouch ? "Tap here for About Rufus" : "Press A for About Rufus", { size: 14 }),
    pos(width() / 2, 545),
    anchor("center"),
    color(255, 165, 0),
    fixed(),

    rect(width(), 500),
    pos(0, 0),
    opacity(0),
    fixed(),
    area(),
    z(-1),

  onKeyPress("enter", () => {
    go("levelSelect");
  });

  onKeyPress("a", () => {
    go("about");
  });
});

// ============================================
// MAIN GAME
// ============================================
scene("game", (levelIndex, startLives) => {
  const level = ALL_LEVELS[levelIndex];
  let score = 0;
  let isSpinning = false;
  let lives = (startLives !== undefined) ? startLives : 3;
  let spinCooldown = 0;

  // Set gravity
  setGravity(1600);

  // Background sky
  add([
    rect(level.width, height()),
    pos(0, 0),
    color(...level.skyColor),
    fixed(),
    z(-10),
  ]);

  // Draw some background clouds
  for (let i = 0; i < 8; i++) {
    add([
      rect(rand(60, 120), rand(20, 40)),
      pos(rand(0, level.width), rand(30, 200)),
      color(255, 255, 255),
      opacity(0.3),
      z(-5),
    ]);
  }

  // Ground
  const ground = add([
    rect(level.width, 40),
    pos(0, height() - 40),
    color(...level.groundColor),
    outline(2, rgb(0, 100, 0)),
    area(),
    body({ isStatic: true }),
    "ground",
  ]);

  // Draw grass tufts on ground
  for (let gx = 0; gx < level.width; gx += rand(20, 50)) {
    add([
      rect(4, rand(6, 14)),
      pos(gx, height() - 40 - rand(4, 10)),
      color(0, rand(140, 200), 0),
      z(-1),
    ]);
  }

  // --- PLATFORMS ---
  level.platforms.forEach((p) => {
    // Platform body
    add([
      rect(p.width, p.height),
      pos(p.x, p.y),
      color(101, 67, 33),
      outline(2, rgb(60, 40, 20)),
      area(),
      body({ isStatic: true }),
      "platform",
    ]);
    // Grass on top
    add([
      rect(p.width, 6),
      pos(p.x, p.y - 3),
      color(0, 160, 0),
    ]);
  });

  // --- TREATS ---
  level.treats.forEach((t) => {
    add([
      sprite("treat"),
      pos(t.x, t.y),
      area(),
      anchor("center"),
      z(1),
      "treat",
      { collected: false, bobOffset: rand(0, 6.28) },
    ]);
  });

  // Bob the treats up and down
  onUpdate("treat", (t) => {
    t.pos.y += Math.sin(time() * 3 + t.bobOffset) * 0.3;
  });

  // --- CRATES ---
  level.crates.forEach((c) => {
    add([
      sprite("crate"),
      pos(c.x, c.y),
      area(),
      anchor("bot"),
      z(1),
      "crate",
      "destructible",
    ]);
  });

  // --- BOUNCE CRATES (green crates that launch Rufus up!) ---
  if (level.bounceCrates) {
    level.bounceCrates.forEach((bc) => {
      add([
        sprite("bounceCrate"),
        pos(bc.x, bc.y),
        area(),
        anchor("bot"),
        body({ isStatic: true }),
        z(1),
        "bounceCrate",
      ]);
    });
  }

  // --- ENEMIES ---
  level.enemies.forEach((e) => {
    const enemySprite = e.type === "armored" ? "armored" : "walker";
    const en = add([
      sprite(enemySprite),
      pos(e.x, e.y),
      area(),
      anchor("bot"),
      z(1),
      e.type,
      "enemy",
      {
        startX: e.x,
        patrol: e.patrol || 100,
        dir: 1,
        enemyType: e.type,
        isDisarmed: false,
      },
    ]);
  });

  // Enemy patrol movement
  onUpdate("enemy", (e) => {
    e.pos.x += e.dir * 60 * dt();
    if (e.pos.x > e.startX + e.patrol) e.dir = -1;
    if (e.pos.x < e.startX - e.patrol) e.dir = 1;
    e.flipX = e.dir < 0;
  });

  // --- EXIT FLAG ---
  add([
    sprite("flag"),
    pos(level.exit.x, level.exit.y),
    area(),
    anchor("bot"),
    z(1),
    "exit",
  ]);

  // =====================
  // 🦊 RUFUS (the player)
  // =====================
  const rufus = add([
    sprite("rufus"),
    pos(level.playerStart.x, level.playerStart.y),
    area({ shape: new Rect(vec2(0, 0), 28, 30) }),
    body(),
    anchor("center"),
    scale(2),
    z(10),
    "player",
    {
      isSpinning: false,
      spinTimer: 0,
      facingRight: true,
    },
  ]);

  // Camera follows Rufus
  rufus.onUpdate(() => {
    camPos(rufus.pos.x, height() / 2);
  });

  // --- MOVEMENT ---
  onKeyDown("left", () => {
    rufus.move(-foxSpeed, 0);
    rufus.facingRight = false;
    rufus.flipX = true;
  });

  onKeyDown("right", () => {
    rufus.move(foxSpeed, 0);
    rufus.facingRight = true;
    rufus.flipX = false;
  });

  // --- JUMPING ---
  onKeyPress("up", () => {
    if (rufus.isGrounded()) {
      rufus.jump(jumpForce);
    }
  });

  // --- TOUCH CONTROLS (for iPad/phone!) ---
  // Track touch state for continuous movement
  let touchMoving = 0; // -1 left, 0 none, 1 right
  let touchId = null;

  // On-screen buttons (only show on touch devices)
  const isTouchDevice = ("ontouchstart" in window) || navigator.maxTouchPoints > 0;
  if (isTouchDevice) {
    // Left button
    const btnLeft = add([
      rect(90, 90),
      pos(10, height() - 100),
      color(0, 0, 0),
      opacity(0.6),
      outline(3, rgb(255, 255, 255)),
      fixed(),
      z(200),
      area(),
      "touchBtn",
    ]);
    add([
      text("<", { size: 40 }),
      pos(55, height() - 55),
      anchor("center"),
      color(255, 255, 255),
      fixed(),
      z(201),
    ]);

    // Right button
    const btnRight = add([
      rect(90, 90),
      pos(110, height() - 100),
      color(0, 0, 0),
      opacity(0.6),
      outline(3, rgb(255, 255, 255)),
      fixed(),
      z(200),
      area(),
      "touchBtn",
    ]);
    add([
      text(">", { size: 40 }),
      pos(155, height() - 55),
      anchor("center"),
      color(255, 255, 255),
      fixed(),
      z(201),
    ]);

    // Jump button
    const btnJump = add([
      rect(90, 90),
      pos(width() - 195, height() - 100),
      color(0, 0, 0),
      opacity(0.6),
      outline(3, rgb(100, 200, 255)),
      fixed(),
      z(200),
      area(),
      "touchBtn",
    ]);
    add([
      text("JUMP", { size: 22 }),
      pos(width() - 150, height() - 55),
      anchor("center"),
      color(100, 200, 255),
      fixed(),
      z(201),
    ]);

    // Spin button
    const btnSpin = add([
      rect(90, 90),
      pos(width() - 95, height() - 100),
      color(0, 0, 0),
      opacity(0.6),
      outline(3, rgb(255, 165, 0)),
      fixed(),
      z(200),
      area(),
      "touchBtn",
    ]);
    add([
      text("SPIN", { size: 22 }),
      pos(width() - 50, height() - 55),
      anchor("center"),
      color(255, 165, 0),
      fixed(),
      z(201),
    ]);

    // --- MULTI-TOUCH INPUT ---
    // Raw touch events with proper letterbox coordinate conversion.
    // This supports simultaneous move + jump/spin.
    const canvas = document.querySelector("canvas");
    const gameW = 800;
    const gameH = 600;
    const gameAspect = gameW / gameH;

    // Convert a touch's clientX/clientY to game coordinates,
    // accounting for letterbox black bars
    function touchToGame(touch) {
      const r = canvas.getBoundingClientRect();
      const canvasAspect = r.width / r.height;
      let areaX, areaY, areaW, areaH;

      if (canvasAspect > gameAspect) {
        // Black bars on left/right
        areaH = r.height;
        areaW = r.height * gameAspect;
        areaX = r.left + (r.width - areaW) / 2;
        areaY = r.top;
      } else {
        // Black bars on top/bottom
        areaW = r.width;
        areaH = r.width / gameAspect;
        areaX = r.left;
        areaY = r.top + (r.height - areaH) / 2;
      }

      return {
        x: (touch.clientX - areaX) / areaW * gameW,
        y: (touch.clientY - areaY) / areaH * gameH,
      };
    }

    // Track active direction touch
    let moveTouchId = null;
    let touchDir = 0; // -1 left, 0 none, 1 right

    canvas.addEventListener("touchstart", (ev) => {
      ev.preventDefault();
      for (const touch of ev.changedTouches) {
        const g = touchToGame(touch);

        // Left button area
        if (g.x >= 10 && g.x < 100 && g.y > gameH - 100) {
          moveTouchId = touch.identifier;
          touchDir = -1;
        }
        // Right button area
        else if (g.x >= 110 && g.x < 200 && g.y > gameH - 100) {
          moveTouchId = touch.identifier;
          touchDir = 1;
        }
        // Jump button area
        else if (g.x > gameW - 195 && g.x < gameW - 105 && g.y > gameH - 100) {
          if (rufus.isGrounded()) rufus.jump(jumpForce);
        }
        // Spin button area
        else if (g.x > gameW - 95 && g.y > gameH - 100) {
          if (!rufus.isSpinning && spinCooldown <= 0) {
            rufus.isSpinning = true;
            rufus.spinTimer = tailSpinDuration;
            rufus.use(sprite("rufus_spin"));
            rufus.use(scale(2));
            spinCooldown = 0.3;
            for (let i = 0; i < 6; i++) {
              add([
                rect(4, 4),
                pos(rufus.pos.x + rand(-30, 30), rufus.pos.y + rand(-20, 20)),
                color(255, 165, 0), opacity(0.8), lifespan(0.3),
                move(rand(0, 360), rand(50, 150)), z(9),
              ]);
            }
          }
        }
      }
    }, { passive: false });

    canvas.addEventListener("touchend", (ev) => {
      ev.preventDefault();
      for (const touch of ev.changedTouches) {
        // If the direction touch was released, stop moving
        if (touch.identifier === moveTouchId) {
          moveTouchId = null;
          touchDir = 0;
        }
      }
    }, { passive: false });

    canvas.addEventListener("touchmove", (ev) => {
      ev.preventDefault();
    }, { passive: false });

    // Apply touch movement each frame
    rufus.onUpdate(() => {
      if (touchDir === -1) {
        rufus.move(-foxSpeed, 0);
        rufus.facingRight = false;
        rufus.flipX = true;
      } else if (touchDir === 1) {
        rufus.move(foxSpeed, 0);
        rufus.facingRight = true;
        rufus.flipX = false;
      }
    });
  }

  // --- TAIL SPIN ATTACK ---
  onKeyPress("space", () => {
    if (!rufus.isSpinning && spinCooldown <= 0) {
      rufus.isSpinning = true;
      rufus.spinTimer = tailSpinDuration;
      rufus.use(sprite("rufus_spin"));
      rufus.use(scale(2));
      spinCooldown = 0.3;

      // Spin effect - create whirl particles
      for (let i = 0; i < 6; i++) {
        add([
          rect(4, 4),
          pos(rufus.pos.x + rand(-30, 30), rufus.pos.y + rand(-20, 20)),
          color(255, 165, 0),
          opacity(0.8),
          lifespan(0.3),
          move(rand(0, 360), rand(50, 150)),
          z(9),
        ]);
      }
    }
  });

  // Spin timer
  rufus.onUpdate(() => {
    if (rufus.isSpinning) {
      rufus.spinTimer -= dt();
      // Rotate during spin
      rufus.angle += 1200 * dt();
      if (rufus.spinTimer <= 0) {
        rufus.isSpinning = false;
        rufus.use(sprite("rufus"));
        rufus.use(scale(2));
        rufus.angle = 0;
      }
    }
    if (spinCooldown > 0) {
      spinCooldown -= dt();
    }
  });

  // --- COLLECT TREATS ---
  rufus.onCollide("treat", (treat) => {
    if (!treat.collected) {
      treat.collected = true;
      score += 10;
      scoreText.text = `Treats: ${score}`;

      // Sparkle effect!
      for (let i = 0; i < 5; i++) {
        add([
          rect(3, 3),
          pos(treat.pos),
          color(255, 255, rand(0, 100)),
          opacity(1),
          lifespan(0.4),
          move(rand(0, 360), rand(80, 200)),
        ]);
      }
      destroy(treat);
    }
  });

  // --- BOUNCE CRATES launch Rufus super high! ---
  rufus.onCollide("bounceCrate", () => {
    // Super jump! Higher than normal to reach platforms
    rufus.jump(jumpForce * 1.4);

    // Spring effect - green particles burst
    for (let i = 0; i < 8; i++) {
      add([
        rect(4, 4),
        pos(rufus.pos.x + rand(-20, 20), rufus.pos.y + 10),
        color(50, 200, 50),
        opacity(0.9),
        lifespan(0.4),
        move(rand(0, 360), rand(80, 200)),
        z(9),
      ]);
    }
  });

  // --- TAIL SPIN DESTROYS CRATES ---
  rufus.onCollide("crate", (crate) => {
    if (rufus.isSpinning) {
      // Crate explosion effect!
      for (let i = 0; i < 8; i++) {
        add([
          rect(rand(4, 10), rand(4, 10)),
          pos(crate.pos),
          color(139, 105, 20),
          opacity(1),
          lifespan(0.5),
          move(rand(0, 360), rand(100, 300)),
          z(5),
        ]);
      }
      score += 25;
      scoreText.text = `Treats: ${score}`;
      destroy(crate);
    }
  });

  // --- ENEMY INTERACTIONS ---
  let isInvincible = false;

  rufus.onCollide("enemy", (enemy) => {
    // Skip ALL enemy interactions during invincibility
    if (isInvincible) return;

    // Check if we're spinning (tail attack)
    if (rufus.isSpinning) {
      if (enemy.enemyType === "walker" || enemy.isDisarmed) {
        // Tail spin kills walkers and disarmed enemies!
        destroyEnemy(enemy);
      } else if (enemy.enemyType === "armored" && !enemy.isDisarmed) {
        // Can't spin an armored enemy! Rufus gets hurt!
        // Stop the spin immediately
        rufus.isSpinning = false;
        rufus.use(sprite("rufus"));
        rufus.use(scale(2));
        rufus.angle = 0;
        // Visual feedback - sparks!
        for (let i = 0; i < 2; i++) {
          add([
            rect(3, 3),
            pos(enemy.pos),
            color(255, 255, 0),
            lifespan(0.3),
            move(rand(0, 360), rand(100, 200)),
          ]);
        }
        hurtRufus();
      }
    }
    // Check if we're jumping on top of enemy
    else if (rufus.pos.y < enemy.pos.y - 20 && !rufus.isGrounded()) {
      if (enemy.enemyType === "armored" && !enemy.isDisarmed) {
        // Jump disarms armored enemy! Helmet pops off!
        enemy.isDisarmed = true;
        enemy.use(sprite("disarmed"));
        rufus.jump(jumpForce * 0.6); // Bounce off

        // Helmet flying off effect!
        const helmet = add([
          rect(16, 10),
          pos(enemy.pos.x, enemy.pos.y - 30),
          color(192, 192, 192),
          opacity(1),
          lifespan(1),
          move(rand(60, 120), 200),
          z(15),
        ]);
      } else {
        // Stomp kills walkers and disarmed enemies
        destroyEnemy(enemy);
        rufus.jump(jumpForce * 0.6); // Bounce off
      }
    }
    // Enemy hits Rufus (ouch!) — but disarmed enemies are harmless
    else if (!enemy.isDisarmed) {
      hurtRufus();
    }
  });

  function destroyEnemy(enemy) {
    // Poof effect
    for (let i = 0; i < 4; i++) {
      add([
        rect(rand(4, 8), rand(4, 8)),
        pos(enemy.pos),
        color(rand(100, 200), rand(100, 200), rand(100, 200)),
        opacity(1),
        lifespan(0.5),
        move(rand(0, 360), rand(80, 250)),
        z(5),
      ]);
    }
    score += 50;
    scoreText.text = `Treats: ${score}`;
    destroy(enemy);
  }

  function hurtRufus() {
    if (isInvincible) return;
    isInvincible = true; // Prevent any further damage
    lives--;

    if (lives <= 0) {
      go("gameOver", { score, levelIndex });
    } else {
      // Restart the level with remaining lives
      go("game", levelIndex, lives);
    }
  }

  // --- FALL OFF SCREEN ---
  rufus.onUpdate(() => {
    if (rufus.pos.y > height() + 100) {
      hurtRufus();
    }
  });

  // --- REACH EXIT ---
  rufus.onCollide("exit", () => {
    go("levelComplete", { score, levelIndex });
  });

  // --- HUD (Heads Up Display) ---
  const scoreText = add([
    text(`Treats: ${score}`, { size: 20 }),
    pos(20, 20),
    color(255, 255, 255),
    outline(2, rgb(0, 0, 0)),
    fixed(),
    z(100),
  ]);

  const livesText = add([
    text(`Lives: ${"🦊".repeat(lives)}`, { size: 20 }),
    pos(20, 50),
    color(255, 255, 255),
    outline(2, rgb(0, 0, 0)),
    fixed(),
    z(100),
  ]);

  const levelText = add([
    text(`Ch.${levelIndex + 1}: ${level.name}`, { size: 16 }),
    pos(width() - 20, 20),
    anchor("topright"),
    color(255, 200, 100),
    outline(2, rgb(0, 0, 0)),
    fixed(),
    z(100),
  ]);

  // Controls hint (fades away)
  const hint = add([
    text("Arrows: Move | Up: Jump | Space: Tail Spin!", { size: 14 }),
    pos(width() / 2, height() - 30),
    anchor("center"),
    color(255, 255, 255),
    opacity(1),
    outline(1, rgb(0, 0, 0)),
    fixed(),
    z(100),
  ]);
  wait(4, () => {
    if (hint.exists()) hint.opacity = 0;
  });
});

// ============================================
// LEVEL COMPLETE
// ============================================
scene("levelComplete", ({ score, levelIndex }) => {
  const level = ALL_LEVELS[levelIndex];
  const nextLevel = levelIndex + 1;
  const isTouchLC = ("ontouchstart" in window) || navigator.maxTouchPoints > 0;

  // Per-level victory themes
  const themes = [
    { // Level 1 - warm sunset backyard victory
      bg: [255, 200, 100],
      title: "Backyard Champion!",
      message: "Rufus conquered the backyard! The squirrels are shaking in their tiny boots.",
      rufusColor: [255, 165, 0],
    },
    { // Level 2 - night sky celebration
      bg: [20, 20, 60],
      title: "Neighborhood Hero!",
      message: "The armored squirrels have been defeated! Rufus rules the neighborhood!",
      rufusColor: [100, 200, 255],
    },
  ];
  const theme = themes[levelIndex] || themes[0];

  // Background
  add([rect(width(), height()), pos(0, 0), color(...theme.bg), fixed()]);

  // Stars for level 2 night theme
  if (levelIndex === 1) {
    for (let i = 0; i < 40; i++) {
      add([
        rect(2, 2),
        pos(rand(0, width()), rand(0, height() * 0.5)),
        color(255, 255, rand(200, 255)),
        fixed(),
        { t: rand(0, 6.28) },
      ]).onUpdate(function() {
        this.t += dt() * rand(1, 3);
        this.opacity = Math.sin(this.t) * 0.3 + 0.7;
      });
    }
  }

  // Victory title
  add([
    text(theme.title, { size: 44 }),
    pos(width() / 2, 80),
    anchor("center"),
    color(255, 215, 0),
    fixed(),
  ]);

  // Happy Rufus bouncing with joy!
  const victoryFox = add([
    sprite("rufus"),
    pos(width() / 2, 220),
    anchor("center"),
    scale(5),
    fixed(),
  ]);
  // Rufus jumps for joy!
  victoryFox.onUpdate(() => {
    victoryFox.pos.y = 220 + Math.abs(Math.sin(time() * 4)) * -30;
    victoryFox.angle = Math.sin(time() * 3) * 10;
  });

  // Victory particles
  loop(0.3, () => {
    add([
      rect(rand(4, 8), rand(4, 8)),
      pos(rand(100, width() - 100), rand(100, 350)),
      color(255, 215, 0),
      opacity(0.8),
      lifespan(0.8),
      move(rand(0, 360), rand(30, 80)),
      fixed(),
    ]);
  });

  // Score
  add([
    text(`Treats collected: ${score}`, { size: 24 }),
    pos(width() / 2, 340),
    anchor("center"),
    color(255, 255, 255),
    fixed(),
  ]);

  // Level-specific message
  add([
    text(theme.message, { size: 14, width: 500 }),
    pos(width() / 2, 390),
    anchor("center"),
    color(220, 220, 200),
    fixed(),
  ]);

  // Rating based on treats
  const stars = score >= 300 ? 3 : score >= 150 ? 2 : 1;
  const starText = "* ".repeat(stars) + ". ".repeat(3 - stars);
  add([
    text(starText, { size: 40 }),
    pos(width() / 2, 440),
    anchor("center"),
    color(255, 215, 0),
    fixed(),
  ]);

  // Full screen tap target
  const tapTarget = add([
    rect(width(), height()), pos(0, 0), opacity(0), fixed(), area(), z(-1),
  ]);

  if (nextLevel < ALL_LEVELS.length) {
    add([
      text(isTouchLC ? "Tap for next chapter!" : "Press ENTER for next chapter!", { size: 20 }),
      pos(width() / 2, 510),
      anchor("center"),
      color(255, 200, 100),
      fixed(),
      { t: 0 },
    ]).onUpdate(function() { this.t += dt(); this.opacity = Math.sin(this.t * 3) * 0.4 + 0.6; });
    onKeyPress("enter", () => go("memoir", nextLevel));
    tapTarget.onClick(() => go("memoir", nextLevel));
  } else {
    add([
      text("You've completed all chapters!", { size: 22 }),
      pos(width() / 2, 500),
      anchor("center"),
      color(255, 215, 0),
      fixed(),
    ]);
    add([
      text("Rufus is the ultimate fox!", { size: 16 }),
      pos(width() / 2, 535),
      anchor("center"),
      color(200, 180, 140),
      fixed(),
    ]);
    tapTarget.onClick(() => go("levelSelect"));
  }

  onKeyPress("escape", () => go("levelSelect"));
});

// ============================================
// GAME OVER
// ============================================
scene("gameOver", ({ score, levelIndex }) => {
  const isTouchGO = ("ontouchstart" in window) || navigator.maxTouchPoints > 0;

  // Dark cozy night background
  add([rect(width(), height()), pos(0, 0), color(15, 10, 30), fixed()]);

  // Gentle stars
  for (let i = 0; i < 30; i++) {
    add([
      rect(2, 2),
      pos(rand(0, width()), rand(0, height() * 0.4)),
      color(255, 255, rand(200, 255)),
      opacity(rand(0.2, 0.6)),
      fixed(),
    ]);
  }

  // Moon
  add([
    rect(60, 60),
    pos(width() - 120, 60),
    color(255, 250, 200),
    opacity(0.3),
    fixed(),
  ]);
  add([
    rect(50, 50),
    pos(width() - 115, 65),
    color(255, 250, 220),
    opacity(0.5),
    fixed(),
  ]);

  // Title
  add([
    text("Nap Time...", { size: 48 }),
    pos(width() / 2, 100),
    anchor("center"),
    color(150, 130, 200),
    fixed(),
  ]);

  // Sleeping Rufus (big, centered)
  const sleepyFox = add([
    sprite("rufus_sleep"),
    pos(width() / 2, 250),
    anchor("center"),
    scale(6),
    fixed(),
  ]);
  // Gentle breathing animation
  sleepyFox.onUpdate(() => {
    sleepyFox.scale = vec2(6 + Math.sin(time() * 1.5) * 0.15, 6 - Math.sin(time() * 1.5) * 0.1);
  });

  // Floating Z's
  let zTimer = 0;
  onUpdate(() => {
    zTimer += dt();
    if (zTimer > 1.2) {
      zTimer = 0;
      const z = add([
        text("z", { size: rand(16, 28) }),
        pos(width() / 2 + rand(20, 60), 220),
        color(180, 170, 220),
        opacity(0.8),
        fixed(),
        lifespan(2.5),
        { t: 0 },
      ]);
      z.onUpdate(() => {
        z.t += dt();
        z.pos.x += 15 * dt();
        z.pos.y -= 30 * dt();
        z.opacity = Math.max(0, 0.8 - z.t * 0.35);
      });
    }
  });

  // Cozy message
  add([
    text("Rufus needs to recharge his tail powers...", { size: 16 }),
    pos(width() / 2, 340),
    anchor("center"),
    color(180, 160, 200),
    fixed(),
  ]);

  add([
    text("He'll be back stronger after a good nap!", { size: 14 }),
    pos(width() / 2, 370),
    anchor("center"),
    color(150, 140, 180),
    fixed(),
  ]);

  // Treats collected
  add([
    text(`Treats saved: ${score}`, { size: 22 }),
    pos(width() / 2, 420),
    anchor("center"),
    color(255, 200, 100),
    fixed(),
  ]);

  // Retry prompt
  add([
    text(isTouchGO ? "Tap to wake Rufus up!" : "Press ENTER to wake Rufus up!", { size: 18 }),
    pos(width() / 2, 490),
    anchor("center"),
    color(255, 165, 0),
    fixed(),
    { t: 0 },
  ]).onUpdate(function() { this.t += dt(); this.opacity = Math.sin(this.t * 2) * 0.3 + 0.7; });

  // Little ground/blanket for Rufus
  add([
    rect(200, 8),
    pos(width() / 2 - 100, 280),
    color(80, 60, 40),
    fixed(),
  ]);

  // Full screen tap target
  const retryBtn = add([
    rect(width(), height()), pos(0, 0), opacity(0), fixed(), area(), z(-1),
  ]);
  retryBtn.onClick(() => go("memoir", levelIndex));

  onKeyPress("enter", () => go("memoir", levelIndex));
  onKeyPress("escape", () => go("levelSelect"));
});

// ============================================
// START THE GAME!
// ============================================
go("title");

</script>
</body>
</html>
